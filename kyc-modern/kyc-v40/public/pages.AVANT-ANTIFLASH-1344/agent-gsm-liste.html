<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Liste GSM</title><script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Inter,system-ui,sans-serif}
.sidebar{background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%)}
.sb-link{display:flex;align-items:center;padding:.625rem .75rem;border-radius:.5rem;color:#cbd5e1;transition:background .15s,color .15s;text-decoration:none}
.sb-link:hover{background:#1e293b;color:#fff}
.sb-link.active{background:#3b82f6;color:#fff;font-weight:600}
</style>
<script>
async function chargerSidebar(m){
  const t=sessionStorage.getItem('kyc_token');
  if(!t){window.location.href='/login';return}
  const u=JSON.parse(sessionStorage.getItem('kyc_user')||'{}');
  const r=await fetch('/static/pages/_sidebar.html');
  document.getElementById('sidebar-mount').innerHTML=await r.text();
  try{
    document.getElementById('sb-avatar').textContent=(u.matricule||'??').substring(0,2);
    document.getElementById('sb-nom').textContent=u.prenom||u.matricule||'';
    document.getElementById('sb-matricule').textContent=u.matricule||'';
    document.getElementById('sb-role').textContent=u.role||'';
  }catch(e){}
  if(m){const e=document.querySelector('[data-menu="'+m+'"]');if(e)e.classList.add('active')}
}
async function seDeconnecterGlobal(){
  const t=sessionStorage.getItem('kyc_token');
  if(t){try{await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+t}})}catch(e){}}
  sessionStorage.clear();window.location.href='/login';
}
</script>
</head><body data-antiflash="1" style="background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%)" class="bg-gray-100 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount" class="w-64 flex-shrink-0" style="background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%);min-height:100vh"></div>
<main class="flex-1 min-w-0 p-6">
<div class="mb-6"><h1 class="text-2xl font-bold text-gray-800">Liste GSM</h1></div>
<div class="bg-white rounded-xl border border-gray-200 p-10 text-center">
<div class="text-5xl mb-4">&#128679;</div>
<h2 class="text-lg font-bold text-gray-700 mb-2">Page en construction</h2>
<p class="text-sm text-gray-500">Cette page sera reconstruite prochainement. La navigation est fonctionnelle.</p>
</div>
</main></div>
<script>window.addEventListener('DOMContentLoaded',function(){chargerSidebar('mes-gsm')});</script>
</body></html>
