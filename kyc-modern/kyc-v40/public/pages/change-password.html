<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Changer le mot de passe</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body style="background:#f3f4f6;min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center" x-data="cp()">
<div style="background:#fff;border-radius:18px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:32px;max-width:420px;width:100%;margin:16px">
<div style="text-align:center;margin-bottom:20px">
<div style="width:56px;height:56px;border-radius:16px;background:#1d4ed8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px">&#128273;</div>
<h1 style="font-size:22px;font-weight:800;color:#1f2937;margin:0">Changer le mot de passe</h1>
<p style="color:#6b7280;font-size:14px;margin:6px 0 0">Pour votre securite, definissez un nouveau mot de passe.</p>
</div>

<label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px">Mot de passe actuel</label>
<input type="password" x-model="current" style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;margin-bottom:14px;box-sizing:border-box">

<label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px">Nouveau mot de passe</label>
<input type="password" x-model="nouveau" style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;margin-bottom:14px;box-sizing:border-box">

<label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px">Confirmer le nouveau mot de passe</label>
<input type="password" x-model="confirm" style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;margin-bottom:14px;box-sizing:border-box">

<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;color:#6b7280">
Le mot de passe doit contenir :
<ul style="margin:6px 0 0;padding-left:18px">
<li :style="regle.len?'color:#15803d':''">Au moins 8 caracteres</li>
<li :style="regle.maj?'color:#15803d':''">Une lettre majuscule</li>
<li :style="regle.min?'color:#15803d':''">Une lettre minuscule</li>
<li :style="regle.chiffre?'color:#15803d':''">Un chiffre</li>
</ul>
</div>

<p x-show="erreur" style="color:#b91c1c;font-size:13px;margin:0 0 12px" x-text="erreur"></p>
<p x-show="ok" style="color:#15803d;font-size:13px;margin:0 0 12px" x-text="ok"></p>

<button @click="changer()" :disabled="loading" style="width:100%;padding:12px;border:none;border-radius:10px;background:#1d4ed8;color:#fff;font-size:15px;font-weight:700;cursor:pointer" x-text="loading?'Changement...':'Changer le mot de passe'"></button>
</div>

<script>
function cp(){
  return {
    current:'', nouveau:'', confirm:'', loading:false, erreur:'', ok:'',
    get regle(){
      return {
        len:(this.nouveau||'').length>=8,
        maj:/[A-Z]/.test(this.nouveau||''),
        min:/[a-z]/.test(this.nouveau||''),
        chiffre:/[0-9]/.test(this.nouveau||'')
      };
    },
    async changer(){
      this.erreur=''; this.ok='';
      if(!this.current||!this.nouveau||!this.confirm){ this.erreur='Tous les champs sont obligatoires'; return; }
      if(this.nouveau!==this.confirm){ this.erreur='Les deux mots de passe ne correspondent pas'; return; }
      const r=this.regle;
      if(!r.len||!r.maj||!r.min||!r.chiffre){ this.erreur='Le nouveau mot de passe ne respecte pas les regles'; return; }
      const t=sessionStorage.getItem('kyc_token');
      if(!t){ window.location.href='/login'; return; }
      this.loading=true;
      try{
        const resp=await fetch('/api/auth/change-password',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({current_password:this.current,new_password:this.nouveau})});
        const d=await resp.json();
        if(resp.ok){
          this.ok='Mot de passe modifie avec succes. Redirection...';
          const u=JSON.parse(sessionStorage.getItem('kyc_user')||'{}');
          let dest='/login';
          if(u.role==='agent') dest='/agent/file-attente';
          else if(u.role==='superviseur') dest='/sup/file-attente';
          else if(u.role==='admin') dest='/admin/dashboard';
          setTimeout(()=>{ window.location.href=dest; }, 1000);
        } else {
          this.erreur=(d.error||'Erreur')+(d.details?' : '+(Array.isArray(d.details)?d.details.join(', '):d.details):'');
        }
      }catch(e){ this.erreur='Erreur reseau'; }
      finally{ this.loading=false; }
    }
  };
}
</script>
</body></html>
