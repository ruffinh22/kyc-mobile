<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Compilation GSM</title><script src="https://cdn.tailwindcss.com"></script><script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body{font-family:Inter,system-ui,sans-serif}
.sidebar{background:linear-gradient(180deg,#0c1e3e 0%,#1e3a5f 100%)}
.sb-link{display:flex;align-items:center;padding:.625rem .75rem;border-radius:.5rem;color:#cbd5e1;transition:background .15s,color .15s;text-decoration:none}
.sb-link:hover{background:#1e293b;color:#fff}
.sb-link.active{background:#3b82f6;color:#fff;font-weight:600}
.chip{padding:6px 14px;border-radius:9999px;font-size:13px;font-weight:600;border:1px solid #cbd5e1;color:#1e3a5f;cursor:pointer}
.chip.on{background:#2563eb;color:#fff;border-color:#2563eb}
</style>
<script>
async function chargerSidebarSup(m){
  const t=sessionStorage.getItem('kyc_token');
  if(!t){window.location.href='/login';return}
  const u=JSON.parse(sessionStorage.getItem('kyc_user')||'{}');
  if(u.role!=='superviseur'&&u.role!=='admin'){window.location.href='/agent/dashboard';return}
  const r=await fetch('/static/pages/_sidebar-sup.html');
  document.getElementById('sidebar-mount').innerHTML=await r.text();
  try{
    document.getElementById('sb-avatar').textContent=(u.matricule||'??').substring(0,2);
    document.getElementById('sb-nom').textContent=u.prenom||u.matricule||'';
    document.getElementById('sb-matricule').textContent=u.matricule||'';
    document.getElementById('sb-role').textContent=u.role||'';
  }catch(e){}
  if(m){const e=document.querySelector('[data-menu="'+m+'"]');if(e)e.classList.add('active')}
}
async function seDeconnecterGlobal(){
  const t=sessionStorage.getItem('kyc_token');
  if(t){try{await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+t}})}catch(e){}}
  sessionStorage.clear();window.location.href='/login';
}
</script>
</head><body class="bg-gray-100 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount"></div>
<main class="flex-1 min-w-0 p-6" x-data="compil()" x-init="init()">
<div class="mb-5 border-b border-gray-200 pb-3"><h1 class="text-2xl font-bold text-gray-800">📊 Compilation GSM - Contrôle équipe</h1></div>

<!-- Filtres -->
<div class="bg-white rounded-xl border border-gray-200 p-4 mb-4">
<p class="text-xs font-semibold text-gray-500 mb-2">Filtres rapides</p>
<div class="flex flex-wrap items-end gap-3">
<div class="flex flex-wrap gap-2">
<button class="chip" :class="rapide==='auj'?'on':''" @click="setRapide('auj')">Aujourd'hui</button>
<button class="chip" :class="rapide==='hier'?'on':''" @click="setRapide('hier')">Hier</button>
<button class="chip" :class="rapide==='7j'?'on':''" @click="setRapide('7j')">7 derniers jours</button>
<button class="chip" :class="rapide==='mois'?'on':''" @click="setRapide('mois')">Ce mois</button>
<button class="chip" :class="rapide==='tout'?'on':''" @click="setRapide('tout')">Tout</button>
</div>
<div><label class="block text-xs font-semibold text-gray-500 mb-1">Du</label><input type="date" x-model="debut" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
<div><label class="block text-xs font-semibold text-gray-500 mb-1">Au</label><input type="date" x-model="fin" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
<button @click="rapide='';charger()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg">🔍 Filtrer</button>
<div class="flex-1"></div>
<button @click="exportExcel()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-lg">⬇ Export Excel</button>
</div>
</div>

<!-- Résultats -->
<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
<div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
<h3 class="font-bold text-gray-800">📋 Résultats <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full" x-text="lignes().length+' saisie(s)'"></span></h3>
<input x-model="recherche" type="text" placeholder="🔍 Rechercher dans toutes les colonnes" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm w-72">
</div>
<div style="overflow-x:hidden">
<table class="w-full" style="table-layout:fixed;font-size:10px">
<thead class="bg-green-700 text-white"><tr>
<th class="px-1 py-2 text-left" style="width:3%">#</th>
<th class="px-1 py-2 text-left" style="width:8%"><span class="inline-flex items-center gap-1">NUMÉRO <span @click="togglePop('numero',$event)" class="cursor-pointer" :class="filtres.numero?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:7%"><span class="inline-flex items-center gap-1">DATE <span @click="togglePop('date_saisie',$event)" class="cursor-pointer" :class="filtres.date_saisie?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:8%"><span class="inline-flex items-center gap-1">AGENT <span @click="togglePop('agent_ctrl',$event)" class="cursor-pointer" :class="filtres.agent_ctrl?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:7%"><span class="inline-flex items-center gap-1">COACH <span @click="togglePop('coach',$event)" class="cursor-pointer" :class="filtres.coach?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:9%"><span class="inline-flex items-center gap-1">CONSTAT <span @click="togglePop('constat',$event)" class="cursor-pointer" :class="filtres.constat?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:8%"><span class="inline-flex items-center gap-1">PIÈCE <span @click="togglePop('piece',$event)" class="cursor-pointer" :class="filtres.piece?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:9%"><span class="inline-flex items-center gap-1">VERBATIM <span @click="togglePop('verbatim',$event)" class="cursor-pointer" :class="filtres.verbatim?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:8%"><span class="inline-flex items-center gap-1">ACTION <span @click="togglePop('action',$event)" class="cursor-pointer" :class="filtres.action?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:7%"><span class="inline-flex items-center gap-1">STATUT <span @click="togglePop('statut_final',$event)" class="cursor-pointer" :class="filtres.statut_final?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:8%"><span class="inline-flex items-center gap-1">TRAIT. <span @click="togglePop('traitement',$event)" class="cursor-pointer" :class="filtres.traitement?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:7%"><span class="inline-flex items-center gap-1">TYPE ID. <span @click="togglePop('type_id',$event)" class="cursor-pointer" :class="filtres.type_id?'text-yellow-300':'text-green-200'">▼</span></span></th>
<th class="px-1 py-2 text-left" style="width:7%">RAISON</th>
<th class="px-1 py-2 text-left" style="width:4%">CAPT.</th>
</tr></thead>
<tbody>
<template x-for="(s,i) in lignes()" :key="s.id">
<tr class="border-t border-gray-100 hover:bg-gray-50" style="word-break:break-word;vertical-align:top">
<td class="px-1 py-2 text-gray-400" x-text="i+1"></td>
<td class="px-1 py-2 font-semibold text-gray-800" x-text="s.numero"></td>
<td class="px-1 py-2 text-gray-600" x-text="formatDate(s.date_saisie)"></td>
<td class="px-1 py-2 text-gray-600" x-text="s.agent_ctrl||'—'"></td>
<td class="px-1 py-2 text-gray-600" x-text="s.coach||'—'"></td>
<td class="px-1 py-2 text-gray-600" x-text="s.constat||'—'"></td>
<td class="px-1 py-2 text-gray-600" x-text="s.piece||'—'"></td>
<td class="px-1 py-2 text-gray-600" x-text="s.verbatim||'—'"></td>
<td class="px-1 py-2 text-gray-600" x-text="s.action||'—'"></td>
<td class="px-1 py-2 font-semibold" :class="statutClasse(s.statut_final)" x-text="s.statut_final||'—'"></td>
<td class="px-1 py-2 text-gray-600" x-text="s.traitement||'—'"></td>
<td class="px-1 py-2 text-gray-600" x-text="s.type_id||'—'"></td>
<td class="px-1 py-2 text-gray-600" x-text="s.raison||'—'"></td>
<td class="px-1 py-2 text-gray-500" x-text="nbCaptures(s)+'/3'"></td>
</tr>
</template>
<tr x-show="lignes().length===0"><td colspan="14" class="text-center text-gray-400 py-8">Aucune saisie trouvée pour cette période.</td></tr>
</tbody>
</table>
</div>
</div>

<!-- Popover filtre colonne -->
<div x-show="pop.col" @click.outside="pop.col=''" class="fixed bg-white border border-gray-300 rounded-lg shadow-xl p-3 z-50" :style="'top:'+pop.y+'px;left:'+pop.x+'px;min-width:180px'" style="display:none">
<p class="text-xs font-bold text-gray-700 mb-2" x-text="pop.titre"></p>
<select x-model="filtres[pop.col]" @change="pop.col=''" class="w-full text-sm border border-gray-300 rounded px-2 py-1.5">
<option value="">— Tous —</option>
<template x-for="v in valeursDe(pop.col)" :key="v"><option :value="v" x-text="pop.col==='date_saisie'?formatDate(v):v"></option></template>
</select>
<button @click="filtres[pop.col]='';pop.col=''" class="mt-2 w-full text-xs text-gray-500 hover:text-gray-700 underline">Effacer ce filtre</button>
</div>

<div x-show="toast" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-semibold z-50 bg-gray-800"><span x-text="toast"></span></div>

</main></div>
<script>
function compil(){
  const pad=n=>String(n).padStart(2,'0');
  const ymd=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  return {
    user:{},
    saisies:[],
    debut:'',
    fin:'',
    rapide:'auj',
    recherche:'',
    filtres:{numero:'',date_saisie:'',agent_ctrl:'',coach:'',constat:'',piece:'',verbatim:'',action:'',statut_final:'',traitement:'',type_id:''},
    pop:{col:'',titre:'',x:0,y:0},
    toast:'',
    async init(){
      if(typeof chargerSidebarSup==='function'){ try{ await chargerSidebarSup('compilation-gsm'); }catch(e){} }
      try{this.user=JSON.parse(sessionStorage.getItem('kyc_user')||'{}')}catch(e){}
      this.setRapide('auj');
    },
    setRapide(p){
      this.rapide=p;
      const now=new Date();
      if(p==='auj'){this.debut=ymd(now);this.fin=ymd(now)}
      else if(p==='hier'){const h=new Date(now);h.setDate(h.getDate()-1);this.debut=ymd(h);this.fin=ymd(h)}
      else if(p==='7j'){const h=new Date(now);h.setDate(h.getDate()-6);this.debut=ymd(h);this.fin=ymd(now)}
      else if(p==='mois'){this.debut=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-01';this.fin=ymd(now)}
      else if(p==='tout'){this.debut='2020-01-01';this.fin=ymd(now)}
      this.charger();
    },
    async charger(){
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/gsm/compilation?debut='+this.debut+'&fin='+this.fin,{headers:{'Authorization':'Bearer '+t}});
        if(r.status===401){window.location.href='/login';return}
        if(r.ok){const d=await r.json();this.saisies=d.saisies||[]}
      }catch(e){console.error(e)}
    },
    lignes(){
      let l=this.saisies;
      for(const k in this.filtres){const v=this.filtres[k];if(v)l=l.filter(s=>(''+(s[k]||''))===v)}
      if(this.recherche){const q=this.recherche.toLowerCase();l=l.filter(s=>JSON.stringify(s).toLowerCase().includes(q))}
      return l;
    },
    valeursDe(col){
      if(!col)return[];
      const set=new Set();
      for(const s of this.saisies){if(s[col]!==null&&s[col]!==undefined&&s[col]!=='')set.add(''+s[col])}
      return Array.from(set).sort();
    },
    togglePop(col,ev){
      const titres={numero:'Numéro',date_saisie:'Date',agent_ctrl:'Agent',coach:'Coach',constat:'Constat',piece:'Pièce',verbatim:'Verbatim',action:'Action',statut_final:'Statut',traitement:'Traitement',type_id:'Type ident.'};
      if(this.pop.col===col){this.pop.col='';return}
      let x=200,y=200;
      if(ev&&ev.clientX){x=Math.min(ev.clientX,window.innerWidth-200);y=ev.clientY+10}
      this.pop={col:col,titre:titres[col]||col,x:x,y:y};
    },
    exportExcel(){
      const data=this.lignes().map((s,i)=>({
        '#':i+1,'Numéro':s.numero,'Date':this.formatDate(s.date_saisie),'Agent':s.agent_ctrl||'',
        'Coach':s.coach||'','Constat':s.constat||'','Pièce':s.piece||'','Verbatim':s.verbatim||'',
        'Action':s.action||'','Statut':s.statut_final||'','Traitement':s.traitement||'',
        'Type ID':s.type_id||'','Raison':s.raison||'','Captures':this.nbCaptures(s)+'/3'
      }));
      if(data.length===0){this.afficherToast('Aucune donnée à exporter');return}
      try{
        const ws=XLSX.utils.json_to_sheet(data);
        const wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,ws,'Compilation GSM');
        XLSX.writeFile(wb,'compilation-gsm_'+this.debut+'_'+this.fin+'.xlsx');
      }catch(e){this.afficherToast('Erreur export')}
    },
    nbCaptures(s){return ['capture_a','capture_p','capture_aa'].filter(k=>s[k]).length},
    formatDate(s){if(!s)return'';const p=s.split('-');return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):s},
    statutClasse(s){const v=(''+(s||'')).toLowerCase();if(v.includes('accept'))return'text-green-600';if(v.includes('rejet'))return'text-red-600';return'text-gray-600'},
    afficherToast(m){this.toast=m;setTimeout(()=>{this.toast=''},2500)}
  };
}
</script>
</body></html>
