<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Export captures</title><script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head><body class="bg-gray-100 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount" class="w-64 flex-shrink-0"></div>
<main class="flex-1 min-w-0 p-6" x-data="expCaptures()" x-init="init()" style="background:#f3f4f6">
<div style="margin-bottom:20px">
<h1 style="font-size:24px;font-weight:800;color:#1f2937;margin:0">Export des captures</h1>
<p style="color:#9ca3af;font-size:14px;margin:2px 0 0">Telecharger les captures en images nommees (numero + A/AA/P) dans un fichier ZIP.</p>
</div>

<div style="background:#fff;border:1px solid #e8e8ec;border-radius:14px;padding:20px;max-width:720px">
  <div style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end">
    <div>
      <label style="display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px">Par numero</label>
      <input x-model="numero" type="text" placeholder="ex: 064505090" style="padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;width:200px">
    </div>
    <div style="color:#9ca3af;font-weight:600;padding-bottom:9px">OU</div>
    <div>
      <label style="display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px">Du</label>
      <input x-model="du" type="date" style="padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px">
    </div>
    <div>
      <label style="display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px">Au</label>
      <input x-model="au" type="date" style="padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px">
    </div>
  </div>
  <div style="margin-top:18px;display:flex;gap:12px;align-items:center">
    <button @click="exporter()" :disabled="loading" style="background:#15803d;color:#fff;font-weight:700;padding:10px 22px;border:none;border-radius:8px;cursor:pointer;font-size:14px" x-text="loading?'Preparation...':'Exporter en ZIP'"></button>
    <span x-show="msg" x-text="msg" :style="ok?'color:#15803d':'color:#b91c1c'" style="font-size:13px;font-weight:600"></span>
  </div>
  <p style="font-size:12px;color:#9ca3af;margin-top:14px">Renseignez un numero precis, OU une periode (du + au). Les images seront nommees numero_A.jpg, numero_AA.jpg, etc.</p>
</div>
</main></div>

<script>
function expCaptures(){
  return {
    numero:'', du:'', au:'', loading:false, msg:'', ok:false,
    token(){ return sessionStorage.getItem('kyc_token')||''; },
    async init(){
      try{ const r=await fetch('/static/pages/_sidebar-admin.html'); if(r.ok){ document.getElementById('sidebar-mount').innerHTML=await r.text(); } }catch(e){}
    },
    async exporter(){
      this.msg=''; this.ok=false;
      const num=this.numero.trim();
      if(!num && !(this.du && this.au)){ this.msg='Renseignez un numero OU une periode (du + au).'; return; }
      if(typeof JSZip==='undefined'){ this.msg='Librairie ZIP non chargee (verifiez la connexion).'; return; }
      this.loading=true;
      try{
        let url='/api/gsm/export-captures?';
        if(num) url+='numero='+encodeURIComponent(num);
        else url+='du='+encodeURIComponent(this.du)+'&au='+encodeURIComponent(this.au);
        const r=await fetch(url,{headers:{'Authorization':'Bearer '+this.token()}});
        if(!r.ok){ const e=await r.json().catch(()=>({})); this.msg=e.error||'Erreur'; this.loading=false; return; }
        const d=await r.json();
        if(!d.saisies || d.saisies.length===0){ this.msg='Aucune capture trouvee pour cette selection.'; this.loading=false; return; }
        const zip=new JSZip();
        let total=0;
        const compteurParNum={};
        for(const sa of d.saisies){
          const noms=sa.noms||[];
          sa.images.forEach((img,i)=>{
            if(!img) return;
            // extraire le base64 pur
            let data=img; let ext='jpg';
            const m=img.match(/^data:image\/(\w+);base64,(.*)$/);
            if(m){ ext=(m[1]==='jpeg'?'jpg':m[1]); data=m[2]; } else { data=img.replace(/^data:.*;base64,/,''); }
            let nom=noms[i] || ('cap'+(i+1));
            // eviter doublons de noms pour un meme numero
            const cle=sa.numero+'_'+nom;
            compteurParNum[cle]=(compteurParNum[cle]||0)+1;
            const suffixe=compteurParNum[cle]>1?('('+compteurParNum[cle]+')'):'';
            const fichier=sa.numero+'_'+nom+suffixe+'.'+ext;
            zip.file(fichier, data, {base64:true});
            total++;
          });
        }
        const blob=await zip.generateAsync({type:'blob'});
        const a=document.createElement('a');
        const nomZip = num ? ('captures_'+num+'.zip') : ('captures_'+this.du+'_'+this.au+'.zip');
        a.href=URL.createObjectURL(blob); a.download=nomZip; document.body.appendChild(a); a.click(); a.remove();
        this.ok=true; this.msg=total+' image(s) exportee(s) dans '+nomZip;
      }catch(e){ this.msg='Erreur: '+e.message; }
      this.loading=false;
    }
  };
}
</script>
</body></html>
