<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Gestion des comptes</title><script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Inter,system-ui,sans-serif}
.sidebar{background:linear-gradient(180deg,#7f1d1d 0%,#991b1b 100%)}
.sb-link{display:flex;align-items:center;padding:.625rem .75rem;border-radius:.5rem;color:#cbd5e1;transition:background .15s,color .15s;text-decoration:none}
.sb-link:hover{background:#1e293b;color:#fff}
.sb-link.active{background:#3b82f6;color:#fff;font-weight:600}
</style>
<script>
async function chargerSidebarAdm(m){
  const t=sessionStorage.getItem('kyc_token');
  if(!t){window.location.href='/login';return}
  const u=JSON.parse(sessionStorage.getItem('kyc_user')||'{}');
  const r=await fetch('/static/pages/_sidebar-admin.html');
  document.getElementById('sidebar-mount').innerHTML=await r.text();
  try{
    document.getElementById('sb-avatar').textContent=(u.matricule||'??').substring(0,2);
    document.getElementById('sb-nom').textContent=u.prenom||u.matricule||'';
    document.getElementById('sb-matricule').textContent=u.matricule||'';
    document.getElementById('sb-role').textContent=u.role||'';
  }catch(e){}
  if(m){const e=document.querySelector('[data-menu="'+m+'"]');if(e)e.classList.add('active')}
}
async function seDeconnecterGlobal(){
  const t=sessionStorage.getItem('kyc_token');
  if(t){try{await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+t}})}catch(e){}}
  sessionStorage.clear();window.location.href='/login';
}
</script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head><body data-antiflash="1" style="background:linear-gradient(180deg,#7f1d1d 0%,#991b1b 100%)" class="bg-gray-100 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount" class="w-64 flex-shrink-0" style="background:linear-gradient(180deg,#7f1d1d 0%,#991b1b 100%);min-height:100vh"></div>
<main class="flex-1 min-w-0 p-6" x-data="comptesAdmin()" x-init="init()" style="background:#f3f4f6">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
<div><h1 style="font-size:24px;font-weight:800;color:#1f2937;margin:0">Gestion des comptes</h1>
<p style="color:#9ca3af;font-size:14px;margin:2px 0 0"><span x-text="comptesFiltres().length"></span> compte(s) affiche(s)</p></div>
<button @click="ouvrirCreer()" style="padding:10px 18px;border:none;border-radius:10px;background:#991b1b;color:#fff;font-size:14px;font-weight:700;cursor:pointer">+ Creer un compte</button>
</div>

<div style="background:#fff;border:1px solid #e8e8ec;border-radius:14px;padding:14px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:center">
<input type="text" x-model="recherche" placeholder="Rechercher (matricule, nom...)" style="flex:1;min-width:200px;padding:9px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px">
<select x-model="filtreRole" style="padding:9px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px">
<option value="">Tous les roles</option><option value="agent">Agents</option><option value="superviseur">Superviseurs</option><option value="admin">Admins</option>
</select>
<select x-model="filtreActif" style="padding:9px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px">
<option value="">Tous</option><option value="1">Actifs</option><option value="0">Inactifs</option>
</select>
</div>

<div style="background:#fff;border:1px solid #e8e8ec;border-radius:16px;padding:8px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow-x:auto">
<table style="width:100%;border-collapse:collapse;font-size:13px">
<thead><tr style="background:#7f1d1d;color:#fff">
<th style="padding:10px 8px;text-align:left;border-radius:8px 0 0 0">MATRICULE</th>
<th style="padding:10px 8px;text-align:left">NOM</th>
<th style="padding:10px 8px;text-align:center">ROLE</th>
<th style="padding:10px 8px;text-align:center">STATUT</th>
<th style="padding:10px 8px;text-align:left">DERNIERE CONNEXION</th>
<th style="padding:10px 8px;text-align:center;border-radius:0 8px 0 0">ACTIONS</th>
</tr></thead>
<tbody>
<template x-for="c in comptesFiltres()" :key="c.matricule">
<tr style="border-bottom:1px solid #f0f0f0">
<td style="padding:9px 8px;font-weight:700;color:#1f2937" x-text="c.matricule"></td>
<td style="padding:9px 8px;color:#374151" x-text="((c.prenom||'')+' '+(c.nom||'')).trim()||'-'"></td>
<td style="padding:9px 8px;text-align:center"><span :style="badgeRole(c.role)" x-text="c.role"></span></td>
<td style="padding:9px 8px;text-align:center"><span x-show="c.actif" style="background:#dcfce7;color:#15803d;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600">Actif</span><span x-show="!c.actif" style="background:#fee2e2;color:#b91c1c;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600">Inactif</span></td>
<td style="padding:9px 8px;color:#6b7280;white-space:nowrap" x-text="c.last_login_at?formatDate(c.last_login_at):'jamais'"></td>
<td style="padding:9px 8px;text-align:center;white-space:nowrap">
<button @click="resetPassword(c)" title="Reinitialiser mot de passe" style="padding:5px 10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;margin-right:4px">Reset MDP</button>
<button x-show="c.actif" @click="desactiver(c)" style="padding:5px 10px;border:none;border-radius:8px;background:#fee2e2;color:#b91c1c;font-size:12px;font-weight:600;cursor:pointer">Desactiver</button>
<button x-show="!c.actif" @click="activer(c)" style="padding:5px 10px;border:none;border-radius:8px;background:#dcfce7;color:#15803d;font-size:12px;font-weight:600;cursor:pointer">Activer</button>
</td>
</tr>
</template>
<tr x-show="comptesFiltres().length===0"><td colspan="6" style="padding:20px;text-align:center;color:#9ca3af">Aucun compte</td></tr>
</tbody>
</table>
</div>

<!-- Modale creer -->
<div x-show="modalCreer.ouvert" style="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px" x-cloak>
<div style="background:#fff;border-radius:18px;padding:24px;max-width:440px;width:100%">
<h3 style="font-size:20px;font-weight:800;margin:0 0 16px;color:#1f2937">Creer un compte</h3>
<label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px">Matricule *</label>
<input type="text" x-model="modalCreer.matricule" placeholder="Ex: AJDUPONT" style="width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;margin-bottom:12px;box-sizing:border-box">
<div style="display:flex;gap:10px">
<div style="flex:1"><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px">Prenom *</label><input type="text" x-model="modalCreer.prenom" style="width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;margin-bottom:12px;box-sizing:border-box"></div>
<div style="flex:1"><label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px">Nom</label><input type="text" x-model="modalCreer.nom" style="width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;margin-bottom:12px;box-sizing:border-box"></div>
</div>
<label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px">Role *</label>
<select x-model="modalCreer.role" style="width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;margin-bottom:12px;box-sizing:border-box">
<option value="agent">Agent</option><option value="superviseur">Superviseur</option><option value="admin">Admin</option>
</select>
<label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px">Mot de passe *</label>
<input type="text" x-model="modalCreer.password" placeholder="Min 8 car., maj/min/chiffre" style="width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;margin-bottom:6px;box-sizing:border-box">
<p x-show="modalCreer.erreur" style="color:#b91c1c;font-size:12px;margin:4px 0" x-text="modalCreer.erreur"></p>
<div style="display:flex;gap:10px;margin-top:16px">
<button @click="modalCreer.ouvert=false" style="flex:1;padding:10px;border:1px solid #d1d5db;border-radius:10px;background:#fff;font-weight:600;cursor:pointer">Annuler</button>
<button @click="confirmerCreer()" style="flex:1;padding:10px;border:none;border-radius:10px;background:#991b1b;color:#fff;font-weight:700;cursor:pointer">Creer</button>
</div>
</div>
</div>

<!-- Toast -->
<div x-show="toast.show" x-cloak style="position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;color:#fff;font-weight:600;z-index:60" :style="toast.type==='error'?'background:#b91c1c':'background:#15803d'" x-text="toast.msg"></div>
</main></div>
<script>
function comptesAdmin(){
  return {
    comptes:[], recherche:'', filtreRole:'', filtreActif:'',
    modalCreer:{ouvert:false,matricule:'',prenom:'',nom:'',role:'agent',password:'',erreur:''},
    toast:{show:false,msg:'',type:'success'},
    async init(){
      if(typeof chargerSidebarAdm==='function'){ try{ await chargerSidebarAdm('comptes'); }catch(e){} }
      await this.charger();
    },
    async charger(){
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/admin/comptes',{headers:{'Authorization':'Bearer '+t}});
        if(r.status===401){window.location.href='/login';return}
        const d=await r.json(); this.comptes=d.comptes||[];
      }catch(e){ this.comptes=[]; }
    },
    comptesFiltres(){
      let l=this.comptes;
      if(this.filtreRole) l=l.filter(c=>c.role===this.filtreRole);
      if(this.filtreActif!=='') l=l.filter(c=>String(c.actif)===this.filtreActif);
      if(this.recherche){const q=this.recherche.toLowerCase();l=l.filter(c=>(c.matricule||'').toLowerCase().includes(q)||(c.nom||'').toLowerCase().includes(q)||(c.prenom||'').toLowerCase().includes(q));}
      return l;
    },
    badgeRole(role){
      const m={agent:'background:#dbeafe;color:#1d4ed8',superviseur:'background:#fef3c7;color:#a16207',admin:'background:#fee2e2;color:#b91c1c'};
      return (m[role]||'background:#f3f4f6;color:#374151')+';padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600';
    },
    formatDate(ts){ if(!ts)return'jamais'; const d=new Date(ts*1000); return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); },
    afficherToast(msg,type){ this.toast={show:true,msg:msg,type:type||'success'}; setTimeout(()=>{this.toast.show=false},2500); },
    ouvrirCreer(){ this.modalCreer={ouvert:true,matricule:'',prenom:'',nom:'',role:'agent',password:'',erreur:''}; },
    async confirmerCreer(){
      const m=this.modalCreer;
      if(!m.matricule||!m.prenom||!m.role||!m.password){ m.erreur='Matricule, prenom, role et mot de passe obligatoires'; return; }
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/admin/comptes',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({matricule:m.matricule,prenom:m.prenom,nom:m.nom,role:m.role,password:m.password})});
        const d=await r.json();
        if(r.ok){ this.modalCreer.ouvert=false; this.afficherToast('Compte cree: '+d.matricule); await this.charger(); }
        else { m.erreur=(d.error||'Erreur')+(d.details?' - '+(Array.isArray(d.details)?d.details.join(', '):d.details):''); }
      }catch(e){ m.erreur='Erreur reseau'; }
    },
    async resetPassword(c){
      const np=prompt('Nouveau mot de passe pour '+c.matricule+' (min 8 car., maj/min/chiffre):');
      if(!np) return;
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/admin/comptes/'+c.matricule+'/reset-password',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({password:np})});
        const d=await r.json();
        if(r.ok){ this.afficherToast('Mot de passe reinitialise'); }
        else { this.afficherToast(d.error||'Erreur','error'); }
      }catch(e){ this.afficherToast('Erreur reseau','error'); }
    },
    async desactiver(c){
      if(!confirm('Desactiver le compte '+c.matricule+' ?')) return;
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/admin/comptes/'+c.matricule,{method:'DELETE',headers:{'Authorization':'Bearer '+t}});
        if(r.ok){ this.afficherToast('Compte desactive'); await this.charger(); }
        else { const d=await r.json(); this.afficherToast(d.error||'Erreur','error'); }
      }catch(e){ this.afficherToast('Erreur reseau','error'); }
    },
    async activer(c){
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/admin/comptes/'+c.matricule+'/activer',{method:'POST',headers:{'Authorization':'Bearer '+t}});
        if(r.ok){ this.afficherToast('Compte active'); await this.charger(); }
        else { const d=await r.json(); this.afficherToast(d.error||'Erreur','error'); }
      }catch(e){ this.afficherToast('Erreur reseau','error'); }
    }
  };
}
(function(){
  function demarrer(){ if(typeof chargerSidebarAdm==='function'){ try{ chargerSidebarAdm('comptes'); }catch(e){} } }
  if(document.readyState==='loading'){ window.addEventListener('DOMContentLoaded',demarrer); }
})();
</script>
<style>[x-cloak]{display:none!important}</style>
</body></html>
