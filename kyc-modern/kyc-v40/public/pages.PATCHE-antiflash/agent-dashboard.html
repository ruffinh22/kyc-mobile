<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Tableau de bord</title><script src="https://cdn.tailwindcss.com"></script><script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
body{font-family:'Inter',system-ui,sans-serif}
.sidebar{background:linear-gradient(180deg,#1A1A1A 0%,#2a2a2a 100%)}
.sb-link{display:flex;align-items:center;padding:.625rem .75rem;border-radius:.5rem;color:#d1d5db;transition:background .15s,color .15s;text-decoration:none}
.sb-link:hover{background:#374151;color:#fff}
.sb-link.active{background:#eab308;color:#111827;font-weight:600}
</style>
<script>
async function chargerSidebar(m){
  const t=sessionStorage.getItem('kyc_token');
  if(!t){window.location.href='/login';return}
  const r=await fetch('/static/pages/_sidebar.html');
  document.getElementById('sidebar-mount').innerHTML=await r.text();
  try{
    const u=JSON.parse(sessionStorage.getItem('kyc_user')||'{}');
    document.getElementById('sb-avatar').textContent=(u.matricule||'??').substring(0,2);
    document.getElementById('sb-nom').textContent=u.prenom||u.matricule||'';
    document.getElementById('sb-matricule').textContent=u.matricule||'';
    document.getElementById('sb-role').textContent=u.role||'';
  }catch(e){}
  if(m){const e=document.querySelector('[data-menu="'+m+'"]');if(e)e.classList.add('active')}
}
async function seDeconnecterGlobal(){
  const t=sessionStorage.getItem('kyc_token');
  if(t){try{await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+t}})}catch(e){}}
  sessionStorage.clear();window.location.href='/login';
}
</script>
</head><body data-antiflash="1" style="background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%)" class="bg-gray-100 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount" class="w-64 flex-shrink-0" style="background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%);min-height:100vh"></div>
<main class="flex-1 p-6" x-data="dash()" x-init="init()">
<div class="mb-6 border-b border-gray-200 pb-3"><h1 class="text-2xl font-bold text-gray-800">📋 Tableau de bord</h1></div>

<!-- 4 cartes -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
<div class="rounded-xl p-5 text-white shadow" style="background:#1e3a5f"><p class="text-[11px] font-semibold uppercase tracking-wide opacity-80">Total saisies</p><p class="text-4xl font-bold mt-2" x-text="compteurs.total"></p></div>
<div class="rounded-xl p-5 text-white shadow" style="background:#15803d"><p class="text-[11px] font-semibold uppercase tracking-wide opacity-80">Aujourd'hui</p><p class="text-4xl font-bold mt-2" x-text="compteurs.aujourdhui"></p></div>
<div class="rounded-xl p-5 text-white shadow" style="background:#0e7490"><p class="text-[11px] font-semibold uppercase tracking-wide opacity-80">7 derniers jours</p><p class="text-4xl font-bold mt-2" x-text="compteurs.sept_jours"></p></div>
<div class="rounded-xl p-5 text-white shadow" style="background:#d97706"><p class="text-[11px] font-semibold uppercase tracking-wide opacity-80">Mois de paie</p><p class="text-4xl font-bold mt-2" x-text="compteurs.mois_paie"></p><p class="text-xs opacity-90 mt-1" x-text="moisLabel"></p></div>
</div>

<!-- Planning jour / demain -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
<div class="px-4 py-3 text-white font-bold text-sm" style="background:#15803d">📅 Mon planning du jour <span class="font-normal opacity-90">(<span x-text="dateJourFr"></span>)</span></div>
<table class="w-full text-sm"><thead class="bg-gray-50 text-xs text-gray-500"><tr><th class="px-4 py-2 text-left font-semibold">Horaire</th><th class="px-4 py-2 text-left font-semibold">Activité</th><th class="px-4 py-2 text-left font-semibold">Lieu</th></tr></thead><tbody><template x-for="(s,i) in planJour" :key="i"><tr class="border-t border-gray-100"><td class="px-4 py-2 font-semibold" x-text="s.heure_debut?(s.heure_debut+' — '+s.heure_fin):(s.horaire||'—')"></td><td class="px-4 py-2" x-text="s.activite||'—'"></td><td class="px-4 py-2 text-gray-500" x-text="s.lieu||'—'"></td></tr></template><tr x-show="planJour.length===0"><td colspan="3" class="text-center text-gray-400 py-6">Aucun planning</td></tr></tbody></table>
</div>
<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
<div class="px-4 py-3 text-white font-bold text-sm" style="background:#1e3a5f">📅 Mon planning de demain <span class="font-normal opacity-90">(<span x-text="demainFr"></span>)</span></div>
<table class="w-full text-sm"><thead class="bg-gray-50 text-xs text-gray-500"><tr><th class="px-4 py-2 text-left font-semibold">Horaire</th><th class="px-4 py-2 text-left font-semibold">Activité</th><th class="px-4 py-2 text-left font-semibold">Lieu</th></tr></thead><tbody><template x-for="(s,i) in planDemain" :key="i"><tr class="border-t border-gray-100"><td class="px-4 py-2 font-semibold" x-text="s.heure_debut?(s.heure_debut+' — '+s.heure_fin):(s.horaire||'—')"></td><td class="px-4 py-2" x-text="s.activite||'—'"></td><td class="px-4 py-2 text-gray-500" x-text="s.lieu||'—'"></td></tr></template><tr x-show="planDemain.length===0"><td colspan="3" class="text-center text-gray-400 py-6">Aucun planning</td></tr></tbody></table>
</div>
</div>

<!-- 5 dernières saisies -->
<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
<div class="px-4 py-3 border-b border-gray-100"><h3 class="font-bold text-gray-800">📋 Mes 5 dernières saisies</h3></div>
<table class="w-full text-sm">
<thead class="bg-gray-50 text-xs uppercase text-gray-500"><tr><th class="px-4 py-3 text-left">N° GSM</th><th class="px-4 py-3 text-left">Date</th><th class="px-4 py-3 text-left">Constat</th><th class="px-4 py-3 text-left">Statut</th></tr></thead>
<tbody>
<template x-for="g in dernieres" :key="g.id">
<tr class="border-t border-gray-100"><td class="px-4 py-3 font-semibold text-gray-800" x-text="g.numero"></td><td class="px-4 py-3 text-gray-600" x-text="formatDate(g.date_saisie)"></td><td class="px-4 py-3 text-gray-600" x-text="g.constat||'—'"></td><td class="px-4 py-3 font-semibold" :class="statutClasse(g.statut_final)" x-text="g.statut_final||'—'"></td></tr>
</template>
<tr x-show="dernieres.length===0"><td colspan="4" class="text-center text-gray-400 py-8">Aucune saisie</td></tr>
</tbody>
</table>
</div>

</main></div>
<script>
function dash(){
  return {
    user:{},
    compteurs:{total:0,aujourdhui:0,sept_jours:0,mois_paie:0},
    moisLabel:'',
    dernieres:[],
    dateJourFr:'',
    demainFr:'',
    planJour:[],
    planDemain:[],
    async init(){
      await chargerSidebar('dashboard');
      try{this.user=JSON.parse(sessionStorage.getItem('kyc_user')||'{}')}catch(e){}
      // Dates
      const now=new Date();
      this.dateJourFr=now.toLocaleDateString('fr-FR');
      const demain=new Date(now);demain.setDate(demain.getDate()+1);
      let dj=demain.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
      this.demainFr=dj.charAt(0).toUpperCase()+dj.slice(1);
      // Données
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/gsm/mon-tableau',{headers:{'Authorization':'Bearer '+t}});
        if(r.status===401){window.location.href='/login';return}
        if(r.ok){
          const d=await r.json();
          this.compteurs=d.compteurs||this.compteurs;
          this.moisLabel=d.mois_paie_libelle||'';
          this.dernieres=d.dernieres||[];
        }
      }catch(e){console.error(e)}
      // Planning (jour + demain) via /api/planning/mon
      try{
        const pad=n=>String(n).padStart(2,'0');
        const ymd=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
        const dJour=ymd(now), dDemain=ymd(demain);
        const rp=await fetch('/api/planning/mon?debut='+dJour+'&fin='+dDemain,{headers:{'Authorization':'Bearer '+t}});
        if(rp.ok){
          const dp=await rp.json();
          const ent=dp.entrees||[];
          this.planJour=ent.filter(e=>e.date===dJour);
          this.planDemain=ent.filter(e=>e.date===dDemain);
        }
      }catch(e){console.error(e)}
    },
    formatDate(s){if(!s)return'';const p=s.split('-');return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):s},
    statutClasse(s){
      if(!s)return'text-gray-500';
      const v=(''+s).toLowerCase();
      if(v.includes('accept'))return'text-green-600';
      if(v.includes('rejet'))return'text-red-600';
      return'text-gray-600';
    }
  };
}
</script>
</body></html>
