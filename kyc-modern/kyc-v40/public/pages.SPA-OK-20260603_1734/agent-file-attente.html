<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - File d'attente</title><script src="https://cdn.tailwindcss.com"></script><script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
body{font-family:'Inter',system-ui,sans-serif}
.sidebar{background:linear-gradient(180deg,#1A1A1A 0%,#2a2a2a 100%)}
.sb-link{display:flex;align-items:center;padding:.625rem .75rem;border-radius:.5rem;color:#d1d5db;transition:background .15s,color .15s;text-decoration:none}
.sb-link:hover{background:#374151;color:#fff}
.sb-link.active{background:#eab308;color:#111827;font-weight:600}
</style>
<script>
async function chargerSidebar(m){
  const t=sessionStorage.getItem('kyc_token');
  if(!t){window.location.href='/login';return}
  const r=await fetch('/static/pages/_sidebar.html');
  document.getElementById('sidebar-mount').innerHTML=await r.text();
  try{
    const u=JSON.parse(sessionStorage.getItem('kyc_user')||'{}');
    document.getElementById('sb-avatar').textContent=(u.matricule||'??').substring(0,2);
    document.getElementById('sb-nom').textContent=u.prenom||u.matricule||'';
    document.getElementById('sb-matricule').textContent=u.matricule||'';
    document.getElementById('sb-role').textContent=u.role||'';
  }catch(e){}
  if(m){const e=document.querySelector('[data-menu="'+m+'"]');if(e)e.classList.add('active')}
}
async function seDeconnecterGlobal(){
  const t=sessionStorage.getItem('kyc_token');
  if(t){try{await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+t}})}catch(e){}}
  sessionStorage.clear();window.location.href='/login';
}
</script>
</head><body class="bg-gray-50 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount"></div>
<main class="flex-1 p-6" x-data="fileAttente()" x-init="init()">
<div class="flex justify-between mb-6"><div><h1 class="text-2xl font-bold text-gray-800">📋 File d'attente</h1><p class="text-gray-500 text-sm">Mis à jour: <span x-text="derniereMaj"></span></p></div><button @click="charger()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">🔄 Rafraîchir</button></div>
<div x-show="dossiersAttenteVieux>0" class="bg-red-500 text-white text-center py-2 mb-4 rounded">⚠️ <span x-text="dossiersAttenteVieux"></span> dossier(s) en attente > 5 min !</div>
<div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
<div class="bg-white rounded-xl border border-yellow-200 p-4 text-center"><div class="text-3xl font-bold text-yellow-600" x-text="stats.total">0</div><div class="text-xs font-semibold text-gray-500 uppercase">Total</div></div>
<div class="bg-white rounded-xl border border-orange-200 p-4 text-center"><div class="text-3xl font-bold text-orange-600" x-text="stats.en_attente">0</div><div class="text-xs font-semibold text-gray-500 uppercase">En attente</div></div>
<div class="bg-white rounded-xl border border-blue-200 p-4 text-center"><div class="text-3xl font-bold text-blue-600" x-text="stats.en_cours">0</div><div class="text-xs font-semibold text-gray-500 uppercase">En cours</div></div>
<div class="bg-white rounded-xl border border-green-200 p-4 text-center"><div class="text-3xl font-bold text-green-600" x-text="stats.accepte">0</div><div class="text-xs font-semibold text-gray-500 uppercase">Acceptés</div></div>
<div class="bg-white rounded-xl border border-red-200 p-4 text-center"><div class="text-3xl font-bold text-red-600" x-text="stats.rejete">0</div><div class="text-xs font-semibold text-gray-500 uppercase">Rejetés</div></div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div><div class="flex items-center justify-between mb-3"><h2 class="font-bold text-gray-800 uppercase text-sm">📥 En attente</h2><span class="bg-orange-100 text-orange-800 text-xs font-bold px-2 py-1 rounded-full" x-text="enAttente.length"></span></div><div class="space-y-3">
<template x-for="d in enAttente" :key="d.id"><div class="bg-white border-l-4 border-orange-400 rounded-lg shadow-sm p-4"><div class="flex justify-between mb-2"><div><p class="text-sm text-gray-500 italic">🔒 N° masqué</p><p class="text-xs text-gray-400 font-mono" x-text="d.id"></p></div><span class="bg-orange-100 text-orange-800 text-xs px-2 py-1 rounded">en_attente</span></div><div class="text-xs text-gray-600 mb-3"><p>📅 <span x-text="d.heure_reception"></span> • <span :class="dureeMinutes(d.created_at)>5?'text-red-600 font-semibold':''" x-text="dureeMinutes(d.created_at)+' min'"></span></p><p class="text-gray-400 italic">🔒 Informations et captures masquées</p></div><button @click="prendre(d.id)" :disabled="actionEnCours" class="w-full bg-yellow-500 hover:bg-yellow-600 disabled:bg-gray-300 text-white font-semibold py-2 rounded">👉 Prendre</button></div></template>
<div x-show="enAttente.length===0" class="text-center py-8 text-gray-400 text-sm">📭 Aucun dossier en attente</div>
</div></div>
<div><div class="flex items-center justify-between mb-3"><h2 class="font-bold text-gray-800 uppercase text-sm">⚡ En cours</h2><span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded-full" x-text="enCours.length"></span></div><div class="space-y-3">
<template x-for="d in enCours" :key="d.id"><div class="bg-white border-l-4 border-blue-400 rounded-lg shadow-sm p-4"><div class="flex justify-between mb-2"><div><p class="font-bold text-lg text-gray-800" x-text="d.numero_mtn"></p><p class="text-xs text-gray-400 font-mono" x-text="d.id"></p></div><span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">en_cours</span></div><div class="text-xs text-gray-600 mb-3"><p>📅 Pris à <span x-text="d.heure_prise||'?'"></span></p></div>
<!-- Captures (révélées une fois le dossier pris) -->
<div class="grid grid-cols-3 gap-2 mb-3">
<div class="text-center"><div class="aspect-square bg-gray-100 rounded border border-gray-200 overflow-hidden flex items-center justify-center"><img x-show="photosUrls[d.id]&&photosUrls[d.id].recto" :src="photosUrls[d.id]?photosUrls[d.id].recto:''" @click="agrandir(photosUrls[d.id]&&photosUrls[d.id].recto)" class="w-full h-full object-cover cursor-pointer"><span x-show="!(photosUrls[d.id]&&photosUrls[d.id].recto)" class="text-gray-300 text-lg">📷</span></div><p class="text-[10px] text-gray-500 mt-1">Recto CNI</p></div>
<div class="text-center"><div class="aspect-square bg-gray-100 rounded border border-gray-200 overflow-hidden flex items-center justify-center"><img x-show="photosUrls[d.id]&&photosUrls[d.id].verso" :src="photosUrls[d.id]?photosUrls[d.id].verso:''" @click="agrandir(photosUrls[d.id]&&photosUrls[d.id].verso)" class="w-full h-full object-cover cursor-pointer"><span x-show="!(photosUrls[d.id]&&photosUrls[d.id].verso)" class="text-gray-300 text-lg">📷</span></div><p class="text-[10px] text-gray-500 mt-1">Verso CNI</p></div>
<div class="text-center"><div class="aspect-square bg-gray-100 rounded border border-gray-200 overflow-hidden flex items-center justify-center"><img x-show="photosUrls[d.id]&&photosUrls[d.id].live" :src="photosUrls[d.id]?photosUrls[d.id].live:''" @click="agrandir(photosUrls[d.id]&&photosUrls[d.id].live)" class="w-full h-full object-cover cursor-pointer"><span x-show="!(photosUrls[d.id]&&photosUrls[d.id].live)" class="text-gray-300 text-lg">🤳</span></div><p class="text-[10px] text-gray-500 mt-1">Selfie</p></div>
</div>
<div class="grid grid-cols-2 gap-2"><button @click="accepter(d.id)" :disabled="actionEnCours" class="bg-green-500 hover:bg-green-600 disabled:bg-gray-300 text-white font-semibold py-2 rounded">✅ Accepter</button><button @click="ouvrirRejet(d)" :disabled="actionEnCours" class="bg-red-500 hover:bg-red-600 disabled:bg-gray-300 text-white font-semibold py-2 rounded">❌ Rejeter</button></div></div></template>
<div x-show="enCours.length===0" class="text-center py-8 text-gray-400 text-sm">💤 Aucun dossier en cours</div>
</div></div>
</div>
<div x-show="modalRejet.ouvert" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"><div class="bg-white rounded-2xl p-6 max-w-md w-full"><h3 class="text-xl font-bold mb-4">❌ Rejeter</h3><p class="text-sm text-gray-600 mb-2">Numéro: <strong x-text="modalRejet.numero"></strong></p><label class="block text-sm font-semibold mt-4 mb-2">Motif *</label><textarea x-model="modalRejet.raison" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg"></textarea><div class="flex gap-2 mt-6"><button @click="fermerRejet()" class="flex-1 py-2 border border-gray-300 rounded-lg">Annuler</button><button @click="confirmerRejet()" :disabled="!modalRejet.raison||modalRejet.raison.length<3" class="flex-1 py-2 bg-red-500 hover:bg-red-600 disabled:bg-gray-300 text-white font-semibold rounded-lg">Confirmer</button></div></div></div>
<!-- Lightbox capture -->
<div x-show="lightbox" @click="lightbox=''" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4 cursor-zoom-out"><img :src="lightbox" class="max-h-full max-w-full rounded-lg shadow-2xl"></div>
<div x-show="toast.message" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-semibold z-50" :class="toast.type==='success'?'bg-green-500':'bg-red-500'"><span x-text="toast.message"></span></div>
</main></div>
<script>
function fileAttente(){
  return {
    user:{},
    stats:{total:0,en_attente:0,en_cours:0,accepte:0,rejete:0},
    enAttente:[],
    enCours:[],
    photosUrls:{},
    lightbox:'',
    loading:false,
    actionEnCours:false,
    derniereMaj:'',
    dossiersAttenteVieux:0,
    modalRejet:{ouvert:false,id:null,numero:'',raison:''},
    toast:{message:'',type:'success',timer:null},
    pollingTimer:null,
    async init(){
      await chargerSidebar('file-attente');
      try{this.user=JSON.parse(sessionStorage.getItem('kyc_user')||'{}')}catch(e){}
      await this.charger();
      this.pollingTimer=setInterval(()=>this.charger(true),10000);
    },
    async charger(silencieux){
      if(!silencieux)this.loading=true;
      const t=sessionStorage.getItem('kyc_token');
      const d=new Date().toISOString().slice(0,10);
      try{
        const r1=await fetch('/api/dossiers/stats?date='+d,{headers:{'Authorization':'Bearer '+t}});
        if(r1.status===401){window.location.href='/login';return}
        this.stats=await r1.json();
        const r2=await fetch('/api/dossiers?date='+d,{headers:{'Authorization':'Bearer '+t}});
        const dat=await r2.json();
        const tous=dat.dossiers||[];
        this.enAttente=tous.filter(d=>d.statut==='en_attente').sort((a,b)=>a.created_at-b.created_at);
        this.enCours=tous.filter(d=>d.statut==='en_cours'&&d.agent_saisie===this.user.matricule);
        this.dossiersAttenteVieux=this.enAttente.filter(d=>this.dureeMinutes(d.created_at)>5).length;
        this.derniereMaj=new Date().toLocaleTimeString('fr-FR');
        await this.chargerPhotosEnCours();
      }catch(e){console.error(e)}finally{this.loading=false}
    },
    async chargerPhotosEnCours(){
      const t=sessionStorage.getItem('kyc_token');
      const nouveaux={};
      for(const d of this.enCours){
        // Si on a déjà chargé les photos de ce dossier, on les réutilise (évite de recharger à chaque polling)
        if(this.photosUrls[d.id]){nouveaux[d.id]=this.photosUrls[d.id];continue}
        const p={recto:null,verso:null,live:null};
        for(const type of ['recto','verso','live']){
          try{
            const r=await fetch('/api/dossiers/'+d.id+'/photo/'+type,{headers:{'Authorization':'Bearer '+t}});
            if(r.ok){const b=await r.blob();p[type]=URL.createObjectURL(b)}
          }catch(e){}
        }
        nouveaux[d.id]=p;
      }
      // Libère les URLs des dossiers qui ne sont plus en cours
      for(const id in this.photosUrls){
        if(!nouveaux[id]){
          const p=this.photosUrls[id];
          ['recto','verso','live'].forEach(k=>{if(p&&p[k])URL.revokeObjectURL(p[k])});
        }
      }
      this.photosUrls=nouveaux;
    },
    agrandir(url){if(url)this.lightbox=url},
    dureeMinutes(ts){return Math.floor((Math.floor(Date.now()/1000)-ts)/60)},
    async prendre(id){
      if(this.actionEnCours)return;
      this.actionEnCours=true;
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/dossiers/'+id+'/prendre',{method:'POST',headers:{'Authorization':'Bearer '+t}});
        const dat=await r.json();
        if(r.ok){this.afficherToast('Dossier pris','success');await this.charger()}
        else{this.afficherToast(dat.error||'Erreur','error')}
      }catch(e){this.afficherToast('Erreur réseau','error')}finally{this.actionEnCours=false}
    },
    async accepter(id){
      if(!confirm("Confirmer l'acceptation ?"))return;
      if(this.actionEnCours)return;
      this.actionEnCours=true;
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/dossiers/'+id+'/accepter',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:'{}'});
        const dat=await r.json();
        if(r.ok){this.afficherToast('✅ Accepté - GSM à remplir','success');setTimeout(()=>{window.location.href='/agent/gsm/'+id},800);return}
        else{this.afficherToast(dat.error||'Erreur','error')}
      }catch(e){this.afficherToast('Erreur réseau','error')}finally{this.actionEnCours=false}
    },
    ouvrirRejet(d){this.modalRejet={ouvert:true,id:d.id,numero:d.numero_mtn,raison:''}},
    fermerRejet(){this.modalRejet.ouvert=false},
    async confirmerRejet(){
      if(!this.modalRejet.raison||this.modalRejet.raison.length<3)return;
      this.actionEnCours=true;
      const t=sessionStorage.getItem('kyc_token');
      const id=this.modalRejet.id;
      try{
        const r=await fetch('/api/dossiers/'+id+'/rejeter',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({raison_rejet:this.modalRejet.raison})});
        const dat=await r.json();
        if(r.ok){this.afficherToast('❌ Rejeté - GSM à remplir','success');this.fermerRejet();setTimeout(()=>{window.location.href='/agent/gsm/'+id},800);return}
        else{this.afficherToast(dat.error||'Erreur','error')}
      }catch(e){this.afficherToast('Erreur','error')}finally{this.actionEnCours=false}
    },
    afficherToast(m,t){
      this.toast.message=m;this.toast.type=t||'success';
      if(this.toast.timer)clearTimeout(this.toast.timer);
      this.toast.timer=setTimeout(()=>{this.toast.message=''},3000);
    }
  };
}
</script>
</body></html>
