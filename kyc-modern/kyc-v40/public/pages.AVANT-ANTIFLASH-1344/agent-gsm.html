<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Saisie GSM</title><script src="https://cdn.tailwindcss.com"></script><script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
body{font-family:'Inter',system-ui,sans-serif}
.sidebar{background:linear-gradient(180deg,#1A1A1A 0%,#2a2a2a 100%)}
.sb-link{display:flex;align-items:center;padding:.625rem .75rem;border-radius:.5rem;color:#d1d5db;transition:background .15s,color .15s;text-decoration:none}
.sb-link:hover{background:#374151;color:#fff}
.sb-link.active{background:#eab308;color:#111827;font-weight:600}
.g-input{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px}
.g-input:focus{outline:none;border-color:#f2b705;box-shadow:0 0 0 2px rgba(242,183,5,.2)}
.g-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px}
.drop{border:2px dashed #d1d5db;border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa}
.drop:hover{border-color:#f2b705;background:#fffbeb}
.drop.has{border-color:#15803d;background:#f0fdf4}
.drop.dis{opacity:.45;cursor:not-allowed;background:#f3f4f6}
</style>
<script>
async function chargerSidebar(m){
  const t=sessionStorage.getItem('kyc_token');
  if(!t){window.location.href='/login';return}
  const r=await fetch('/static/pages/_sidebar.html');
  document.getElementById('sidebar-mount').innerHTML=await r.text();
  try{
    const u=JSON.parse(sessionStorage.getItem('kyc_user')||'{}');
    document.getElementById('sb-avatar').textContent=(u.matricule||'??').substring(0,2);
    document.getElementById('sb-nom').textContent=u.prenom||u.matricule||'';
    document.getElementById('sb-matricule').textContent=u.matricule||'';
    document.getElementById('sb-role').textContent=u.role||'';
  }catch(e){}
  if(m){const e=document.querySelector('[data-menu="'+m+'"]');if(e)e.classList.add('active')}
}
async function seDeconnecterGlobal(){
  const t=sessionStorage.getItem('kyc_token');
  if(t){try{await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+t}})}catch(e){}}
  sessionStorage.clear();window.location.href='/login';
}
</script>
</head><body class="bg-gray-100 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount"></div>
<main class="flex-1 min-w-0 p-6" x-data="gsmForm()" x-init="init()">

<div class="flex items-center gap-3 mb-5 border-b border-gray-200 pb-3">
<a href="/agent/file-attente" class="text-gray-400 hover:text-gray-700 text-2xl">&#8592;</a>
<h1 class="text-2xl font-bold text-gray-800">&#128241; Saisie GSM</h1>
</div>

<!-- Encart dossier traite -->
<div class="bg-white rounded-xl border-l-4 p-4 mb-5" :class="dossier.statut==='rejete'?'border-red-400':'border-green-400'">
<div class="flex items-center justify-between flex-wrap gap-2">
<div>
<p class="text-xs uppercase tracking-wide text-gray-400 font-semibold">&#128203; Dossier traite</p>
<p class="text-xl font-bold text-gray-800 mt-1" x-text="dossier.numero_mtn||'(numero masque)'"></p>
</div>
<span class="text-sm font-semibold px-3 py-1 rounded-full" :class="dossier.statut==='rejete'?'bg-red-100 text-red-700':'bg-green-100 text-green-700'" x-text="dossier.statut==='rejete'?'Rejete':'Accepte'"></span>
</div>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-3 text-sm">
<div><span class="text-gray-400 text-xs">Agent terrain</span><p class="font-semibold text-gray-700" x-text="dossier.username_agent||dossier.wa_agent||'\u2014'"></p></div>
<div><span class="text-gray-400 text-xs">Zone</span><p class="font-semibold text-gray-700" x-text="dossier.zone_agent||'\u2014'"></p></div>
<div><span class="text-gray-400 text-xs">Fonction</span><p class="font-semibold text-gray-700" x-text="dossier.fonction_agent||'\u2014'"></p></div>
<div><span class="text-gray-400 text-xs">Recu a</span><p class="font-semibold text-gray-700" x-text="dossier.heure_reception||'\u2014'"></p></div>
</div>
<div x-show="dossier.statut==='rejete'&&dossier.raison_rejet" class="mt-3 text-sm bg-red-50 text-red-700 rounded-lg px-3 py-2"><span class="font-semibold">Motif rejet :</span> <span x-text="dossier.raison_rejet"></span></div>
</div>

<!-- Formulaire -->
<div class="bg-white rounded-xl border border-gray-200 p-5 mb-5">
<h3 class="font-bold text-gray-800 mb-4">&#128221; Informations</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div><label class="g-label">Numero GSM</label><input x-model="form.numero" type="text" inputmode="numeric" maxlength="9" placeholder="9 chiffres" class="g-input"></div>
<div><label class="g-label">Nom du client</label><input x-model="form.nom_client" type="text" placeholder="Nom complet" class="g-input"></div>
<div><label class="g-label">Coach</label><input x-model="form.coach" type="text" placeholder="Coach mobile" class="g-input"></div>
<div><label class="g-label">Type identification <span class="text-red-500">*</span></label><select x-model="form.type_id" class="g-input"><option value="">\u2014</option><option>Avec Parrainage</option><option>Sans Parrainage</option></select></div>
<div><label class="g-label">Piece <span class="text-red-500">*</span></label><select x-model="form.piece" class="g-input"><option value="">\u2014</option><option>ACTE DE NAISSANCE</option><option>CARTE SCOLAIRE</option><option>COPIE D'ACTE DE NAISSANCE</option><option>CARTE D'ETUDIANT</option><option>ATTESTATION D'IMMATRICULATION</option></select></div>
<div><label class="g-label">Constat <span class="text-red-500">*</span></label><select x-model="form.constat" class="g-input"><option value="">\u2014</option><option>Identite complete</option><option>Conflit d'identite</option><option>Absence de photo live</option><option>ID mal scanne</option><option>Erreur information personnelle</option></select></div>
<div><label class="g-label">Verbatim <span class="text-red-500">*</span></label><select x-model="form.verbatim" class="g-input"><option value="">\u2014</option><option>RAS</option><option>Identite complete</option><option>Nom de l'abonne mal renseigne</option><option>Prenom de l'abonne mal renseigne</option><option>Lieu de naissance mal renseigne</option><option>Type ID mal renseigne</option><option>Nom/Prenom avec accent caractere invalide</option></select></div>
<div><label class="g-label">Action <span class="text-red-500">*</span></label><select x-model="form.action" class="g-input"><option value="">\u2014</option><option>Accepte</option><option>Edite et Accepte</option><option>Numero deja accepte</option><option>A rejeter</option></select></div>
<div><label class="g-label">Statut final <span class="text-red-500">*</span></label><select x-model="form.statut_final" class="g-input"><option value="">\u2014</option><option>Accepte</option><option>Inchange</option></select></div>
<div><label class="g-label">Traitement</label><select x-model="form.traitement" class="g-input"><option value="">\u2014</option><option>Home Box</option><option>Operation Banque Mondiale</option><option>Echoue</option></select></div>
</div>
<div class="mt-4"><label class="g-label">Observations</label><textarea x-model="form.observations" rows="2" class="g-input" placeholder="Notes complementaires..."></textarea></div>
</div>

<!-- Captures -->
<div class="bg-white rounded-xl border border-gray-200 p-5 mb-5">
<h3 class="font-bold text-gray-800 mb-1">&#128247; Captures</h3>
<p class="text-xs text-gray-500 mb-4">A = Abonne, P = Parrain, AA = Agent Acquisition. <span class="text-red-500">A et AA obligatoires.</span> P obligatoire si "Avec Parrainage", desactive sinon.</p>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<!-- A -->
<div>
<label class="g-label">&#129489; Abonne (A) <span class="text-red-500">*</span></label>
<div class="drop" :class="captures.a?'has':''" @click="$refs.fa.click()" @dragover.prevent @drop.prevent="deposer($event,'a')">
<input type="file" x-ref="fa" accept="image/*" class="hidden" @change="choisir($event,'a')">
<template x-if="!captures.a"><div><div class="text-3xl mb-1">&#128247;</div><p class="text-xs text-gray-500">Cliquer ou glisser</p></div></template>
<template x-if="captures.a"><div><img :src="apercu.a" class="max-h-24 mx-auto rounded"><p class="text-xs text-green-700 mt-1 truncate" x-text="captures.a.name"></p></div></template>
</div>
</div>
<!-- P -->
<div>
<label class="g-label">&#128100; Parrain (P) <span class="text-red-500" x-show="form.type_id==='Avec Parrainage'">*</span></label>
<div class="drop" :class="(form.type_id==='Sans Parrainage')?'dis':(captures.p?'has':'')" @click="form.type_id!=='Sans Parrainage'&&$refs.fp.click()" @dragover.prevent @drop.prevent="form.type_id!=='Sans Parrainage'&&deposer($event,'p')">
<input type="file" x-ref="fp" accept="image/*" class="hidden" @change="choisir($event,'p')">
<template x-if="form.type_id==='Sans Parrainage'"><div><div class="text-3xl mb-1">&#128683;</div><p class="text-xs text-gray-400">Sans parrainage</p></div></template>
<template x-if="form.type_id!=='Sans Parrainage'&&!captures.p"><div><div class="text-3xl mb-1">&#128247;</div><p class="text-xs text-gray-500">Cliquer ou glisser</p></div></template>
<template x-if="form.type_id!=='Sans Parrainage'&&captures.p"><div><img :src="apercu.p" class="max-h-24 mx-auto rounded"><p class="text-xs text-green-700 mt-1 truncate" x-text="captures.p.name"></p></div></template>
</div>
</div>
<!-- AA -->
<div>
<label class="g-label">&#128084; Agent Acquisition (AA) <span class="text-red-500">*</span></label>
<div class="drop" :class="captures.aa?'has':''" @click="$refs.faa.click()" @dragover.prevent @drop.prevent="deposer($event,'aa')">
<input type="file" x-ref="faa" accept="image/*" class="hidden" @change="choisir($event,'aa')">
<template x-if="!captures.aa"><div><div class="text-3xl mb-1">&#128247;</div><p class="text-xs text-gray-500">Cliquer ou glisser</p></div></template>
<template x-if="captures.aa"><div><img :src="apercu.aa" class="max-h-24 mx-auto rounded"><p class="text-xs text-green-700 mt-1 truncate" x-text="captures.aa.name"></p></div></template>
</div>
</div>
</div>
</div>

<!-- Actions -->
<div class="flex items-center justify-between mb-10">
<div x-show="erreur" class="text-sm text-red-600" x-text="erreur"></div>
<div class="flex-1"></div>
<div class="flex gap-2">
<a href="/agent/file-attente" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-50">Annuler</a>
<button @click="enregistrer()" :disabled="loading||!peutSoumettre()" class="px-5 py-2 bg-yellow-500 hover:bg-yellow-600 disabled:bg-gray-300 text-white text-sm font-semibold rounded-lg" x-text="loading?'Enregistrement...':'\ud83d\udcbe Enregistrer le GSM'"></button>
</div>
</div>

<div x-show="toast.message" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-semibold z-50" :class="toast.type==='success'?'bg-green-500':'bg-red-500'"><span x-text="toast.message"></span></div>

</main></div>
<script>
function gsmForm(){
  return {
    user:{},
    dossierId:'',
    dossier:{},
    form:{numero:'',nom_client:'',coach:'',type_id:'',piece:'',constat:'',verbatim:'',action:'',statut_final:'',traitement:'',observations:''},
    captures:{a:null,p:null,aa:null},
    apercu:{a:'',p:'',aa:''},
    loading:false,
    erreur:'',
    toast:{message:'',type:'success',timer:null},
    async init(){
      await chargerSidebar('file-attente');
      try{this.user=JSON.parse(sessionStorage.getItem('kyc_user')||'{}')}catch(e){}
      // id depuis l'URL /agent/gsm/:id
      const parts=window.location.pathname.split('/').filter(Boolean);
      this.dossierId=parts[parts.length-1]||'';
      await this.chargerDossier();
    },
    async chargerDossier(){
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/dossiers/'+this.dossierId,{headers:{'Authorization':'Bearer '+t}});
        if(r.status===401){window.location.href='/login';return}
        if(r.ok){const d=await r.json();this.dossier=d.dossier||{};if(this.dossier.numero_mtn)this.form.numero=this.dossier.numero_mtn}
        else{this.afficherToast('Dossier introuvable','error')}
      }catch(e){console.error(e)}
    },
    choisir(ev,slot){const f=ev.target.files&&ev.target.files[0];if(f)this.setFichier(f,slot)},
    deposer(ev,slot){const f=ev.dataTransfer.files&&ev.dataTransfer.files[0];if(f)this.setFichier(f,slot)},
    setFichier(f,slot){
      if(!/^image\//.test(f.type)){this.afficherToast('Image uniquement','error');return}
      if(f.size>5*1024*1024){this.afficherToast('Max 5 Mo par capture','error');return}
      this.captures[slot]=f;
      const rd=new FileReader();rd.onload=e=>{this.apercu[slot]=e.target.result};rd.readAsDataURL(f);
    },
    peutSoumettre(){
      const f=this.form;
      if(!f.type_id||!f.constat||!f.piece||!f.verbatim||!f.action||!f.statut_final)return false;
      if(!this.captures.a||!this.captures.aa)return false;
      if(f.type_id==='Avec Parrainage'&&!this.captures.p)return false;
      return true;
    },
    async enregistrer(){
      if(!this.peutSoumettre()){this.erreur='Champs obligatoires (*) et captures A/AA requis (P si Avec Parrainage)';return}
      this.erreur='';this.loading=true;
      const t=sessionStorage.getItem('kyc_token');
      try{
        const body={dossier_id:this.dossierId,...this.form};
        const r=await fetch('/api/gsm',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify(body)});
        const data=await r.json();
        if(!r.ok){this.erreur=data.error||'Erreur';if(data.requis)this.erreur+=' ('+data.requis.join(', ')+')';this.loading=false;return}
        // Upload captures
        const fd=new FormData();
        if(this.captures.a)fd.append('capture_a',this.captures.a);
        if(this.captures.p&&this.form.type_id==='Avec Parrainage')fd.append('capture_p',this.captures.p);
        if(this.captures.aa)fd.append('capture_aa',this.captures.aa);
        const rc=await fetch('/api/gsm/'+data.id+'/captures',{method:'POST',headers:{'Authorization':'Bearer '+t},body:fd});
        if(!rc.ok){const dc=await rc.json().catch(()=>({}));this.afficherToast(dc.error||'GSM cree mais captures echouees','error');this.loading=false;return}
        this.afficherToast('\u2705 GSM enregistre avec captures','success');
        setTimeout(()=>{window.location.href='/agent/file-attente'},1200);
      }catch(e){this.erreur='Erreur reseau';this.loading=false}
    },
    afficherToast(m,t){this.toast.message=m;this.toast.type=t||'success';if(this.toast.timer)clearTimeout(this.toast.timer);this.toast.timer=setTimeout(()=>{this.toast.message=''},3000)}
  };
}
</script>
</body></html>
