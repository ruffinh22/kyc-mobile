<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYC BO - File d'attente</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
body { font-family: 'Inter', system-ui, sans-serif }
.sidebar { background: linear-gradient(180deg,#1A1A1A 0%,#2a2a2a 100%) }
.sb-link { display:flex;align-items:center;padding:.625rem .75rem;border-radius:.5rem;color:#d1d5db;transition:background .15s,color .15s;text-decoration:none }
.sb-link:hover { background:#374151;color:#fff }
.sb-link.active { background:#eab308;color:#111827;font-weight:600 }

/* Badge reconnaissance faciale */
.badge-face {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 9999px;
  letter-spacing: 0.02em;
}
.badge-face-ok      { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
.badge-face-warn    { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
.badge-face-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
.badge-face-pending { background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb; }

/* Barre de score */
.score-bar-wrap { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
</style>
<script>
async function chargerSidebar(m) {
  const t = sessionStorage.getItem('kyc_token');
  if (!t) { window.location.href = '/login'; return; }
  const r = await fetch('/static/pages/_sidebar.html');
  document.getElementById('sidebar-mount').innerHTML = await r.text();
  try {
    const u = JSON.parse(sessionStorage.getItem('kyc_user') || '{}');
    document.getElementById('sb-avatar').textContent    = (u.matricule || '??').substring(0, 2);
    document.getElementById('sb-nom').textContent       = u.prenom || u.matricule || '';
    document.getElementById('sb-matricule').textContent = u.matricule || '';
    document.getElementById('sb-role').textContent      = u.role || '';
  } catch (e) {}
  if (m) { const e = document.querySelector('[data-menu="' + m + '"]'); if (e) e.classList.add('active'); }
}
async function seDeconnecterGlobal() {
  const t = sessionStorage.getItem('kyc_token');
  if (t) { try { await fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + t } }); } catch (e) {} }
  sessionStorage.clear();
  window.location.href = '/login';
}
</script>
</head>
<body data-antiflash="1" style="background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%)" class="bg-gray-50 min-h-screen">
<div class="flex min-h-screen">
  <div id="sidebar-mount" class="w-64 flex-shrink-0" style="background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%);min-height:100vh"></div>

  <main class="flex-1 p-6" x-data="fileAttente()" x-init="init()">

    <!-- En-tete -->
    <div class="flex justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-800">📋 File d'attente</h1>
        <p class="text-gray-500 text-sm">Mis à jour : <span x-text="derniereMaj"></span></p>
      </div>
      <button @click="charger()" class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">🔄 Rafraîchir</button>
    </div>

    <!-- Alerte dossiers anciens -->
    <div x-show="dossiersAttenteVieux > 0" class="bg-red-500 text-white text-center py-2 mb-4 rounded">
      ⚠️ <span x-text="dossiersAttenteVieux"></span> dossier(s) en attente &gt; 5 min !
    </div>

    <!-- Compteurs globaux -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
      <div class="bg-white rounded-xl border border-yellow-200 p-4 text-center">
        <div class="text-3xl font-bold text-yellow-600" x-text="stats.total">0</div>
        <div class="text-xs font-semibold text-gray-500 uppercase">Total</div>
      </div>
      <div class="bg-white rounded-xl border border-orange-200 p-4 text-center">
        <div class="text-3xl font-bold text-orange-600" x-text="stats.en_attente">0</div>
        <div class="text-xs font-semibold text-gray-500 uppercase">En attente</div>
      </div>
      <div class="bg-white rounded-xl border border-blue-200 p-4 text-center">
        <div class="text-3xl font-bold text-blue-600" x-text="stats.en_cours">0</div>
        <div class="text-xs font-semibold text-gray-500 uppercase">En cours</div>
      </div>
      <div class="bg-white rounded-xl border border-green-200 p-4 text-center">
        <div class="text-3xl font-bold text-green-600" x-text="stats.accepte">0</div>
        <div class="text-xs font-semibold text-gray-500 uppercase">Acceptés</div>
      </div>
      <div class="bg-white rounded-xl border border-red-200 p-4 text-center">
        <div class="text-3xl font-bold text-red-600" x-text="stats.rejete">0</div>
        <div class="text-xs font-semibold text-gray-500 uppercase">Rejetés</div>
      </div>
    </div>

    <!-- Colonnes : En attente / En cours -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- === COLONNE EN ATTENTE === -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-bold text-gray-800 uppercase text-sm">📥 En attente</h2>
          <span class="bg-orange-100 text-orange-800 text-xs font-bold px-2 py-1 rounded-full" x-text="enAttente.length"></span>
        </div>
        <div class="space-y-3">
          <template x-for="d in enAttente" :key="d.id">
            <div class="bg-white border-l-4 border-orange-400 rounded-lg shadow-sm p-4">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <p class="text-sm text-gray-500 italic">🔒 N° masqué</p>
                  <p class="text-xs text-gray-400 font-mono" x-text="d.id"></p>
                </div>
                <span class="bg-orange-100 text-orange-800 text-xs px-2 py-1 rounded">en_attente</span>
              </div>
              <div class="text-xs text-gray-600 mb-3">
                <p>📅 <span x-text="d.heure_reception"></span> •
                  <span :class="dureeMinutes(d.created_at)>5 ? 'text-red-600 font-semibold' : ''"
                        x-text="dureeMinutes(d.created_at)+' min'"></span>
                </p>
                <p class="text-gray-400 italic">🔒 Informations et captures masquées</p>
              </div>
              <button @click="prendre(d.id)" :disabled="actionEnCours"
                      class="w-full bg-yellow-500 hover:bg-yellow-600 disabled:bg-gray-300 text-white font-semibold py-2 rounded">
                👉 Prendre
              </button>
            </div>
          </template>
          <div x-show="enAttente.length === 0" class="text-center py-8 text-gray-400 text-sm">
            📭 Aucun dossier en attente
          </div>
        </div>
      </div>

      <!-- === COLONNE EN COURS === -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-bold text-gray-800 uppercase text-sm">⚡ En cours</h2>
          <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded-full" x-text="enCours.length"></span>
        </div>
        <div class="space-y-3">
          <template x-for="d in enCours" :key="d.id">
            <div class="bg-white border-l-4 border-blue-400 rounded-lg shadow-sm p-4">

              <!-- Header dossier -->
              <div class="flex justify-between items-start mb-2">
                <div>
                  <p class="font-bold text-lg text-gray-800" x-text="d.numero_mtn"></p>
                  <p class="text-xs text-gray-400 font-mono" x-text="d.id"></p>
                </div>
                <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">en_cours</span>
              </div>

              <!-- Heure de prise -->
              <div class="text-xs text-gray-600 mb-3">
                <p>📅 Pris à <span x-text="d.heure_prise || '?'"></span></p>
              </div>

              <!-- ============================================================
                   BLOC RECONNAISSANCE FACIALE AMÉLIORÉ
                   Score + Motif + Explication détaillée + Bouton relancer
                   ============================================================ -->
              <div class="mb-4 p-4 rounded-lg border-2" :class="badgeFaceClass(d).bg">

                <!-- Header -->
                <div class="flex items-center justify-between mb-2">
                  <div style="display:flex;align-items:center;gap:8px">
                    <span style="font-size:18px">🔍</span>
                    <span style="font-size:13px;font-weight:700;color:var(--text)">Reconnaissance faciale</span>
                  </div>
                  <!-- Badge principal -->
                  <span class="badge-face" :class="badgeFaceClass(d).badge">
                    <span x-text="badgeFaceClass(d).icon"></span>
                    <span x-text="badgeFaceClass(d).label"></span>
                  </span>
                </div>

                <!-- Score de similarité (si disponible) -->
                <template x-if="d.score_visage !== null && d.score_visage !== undefined">
                  <div style="background:rgba(255,255,255,0.5);padding:10px 12px;border-radius:8px;margin-bottom:10px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                      <span style="font-size:11px;font-weight:600;color:var(--text2)">Score de similarité</span>
                      <span style="font-size:14px;font-weight:700;color:var(--blue)" x-text="d.score_visage.toFixed(1) + '%'"></span>
                    </div>
                    <div class="score-bar-wrap" style="height:7px;margin-bottom:6px">
                      <div class="score-bar-fill"
                           :style="'width:'+d.score_visage+'%;background:'+badgeFaceClass(d).color"></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">
                      <span>0%</span>
                      <span style="color:var(--gold);font-weight:600">⚠ Seuil 70%</span>
                      <span>100%</span>
                    </div>
                  </div>
                </template>

                <!-- Motif détaillé -->
                <div style="font-size:12px;line-height:1.5" :class="badgeFaceClass(d).textClass">
                  <strong>Motif :</strong> <span x-text="badgeFaceClass(d).motifLabel"></span>
                </div>

                <!-- Bouton relancer (superviseur/admin seulement) -->
                <template x-if="user.role === 'superviseur' || user.role === 'admin'">
                  <button @click="relancerFaceVerify(d.id)"
                          :disabled="actionFaceVerify[d.id]"
                          style="margin-top:10px;font-size:11px;color:var(--blue);background:transparent;border:none;cursor:pointer;text-decoration:underline">
                    <span x-show="!actionFaceVerify[d.id]">🔄 Relancer l'analyse</span>
                    <span x-show="actionFaceVerify[d.id]">⏳ Analyse en cours...</span>
                  </button>
                </template>
              </div>
              <!-- FIN BLOC RECONNAISSANCE FACIALE -->

              <!-- ============================================================
                   PHOTOS : CNI (recto/verso) + Selfie
                   ============================================================ -->
              <div class="mb-3">
                <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px">
                  <span style="font-size:16px">📸</span>
                  <span>Photos - Validation visuelle</span>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
                  <!-- Recto CNI -->
                  <div style="text-align:center">
                    <div style="aspect-ratio:1;background:#f5f5f5;border:2px solid #ddd;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center">
                      <img x-show="photosUrls[d.id] && photosUrls[d.id].recto"
                           :src="photosUrls[d.id] ? photosUrls[d.id].recto : ''"
                           @click="agrandir(photosUrls[d.id] && photosUrls[d.id].recto)"
                           style="width:100%;height:100%;object-fit:cover;cursor:pointer;transition:transform 0.2s"
                           @mouseenter="this.style.transform='scale(1.05)'"
                           @mouseleave="this.style.transform='scale(1)'">
                      <span x-show="!(photosUrls[d.id] && photosUrls[d.id].recto)" style="font-size:32px;color:#ccc">📷</span>
                    </div>
                    <p style="font-size:11px;font-weight:600;color:var(--text);margin-top:8px">CNI Recto</p>
                  </div>
                  <!-- Verso CNI -->
                  <div style="text-align:center">
                    <div style="aspect-ratio:1;background:#f5f5f5;border:2px solid #ddd;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center">
                      <img x-show="photosUrls[d.id] && photosUrls[d.id].verso"
                           :src="photosUrls[d.id] ? photosUrls[d.id].verso : ''"
                           @click="agrandir(photosUrls[d.id] && photosUrls[d.id].verso)"
                           style="width:100%;height:100%;object-fit:cover;cursor:pointer;transition:transform 0.2s"
                           @mouseenter="this.style.transform='scale(1.05)'"
                           @mouseleave="this.style.transform='scale(1)'">
                      <span x-show="!(photosUrls[d.id] && photosUrls[d.id].verso)" style="font-size:32px;color:#ccc">📷</span>
                    </div>
                    <p style="font-size:11px;font-weight:600;color:var(--text);margin-top:8px">CNI Verso</p>
                  </div>
                  <!-- Selfie / Photo live -->
                  <div style="text-align:center">
                    <div style="aspect-ratio:1;background:#f5f5f5;border:2px solid var(--blue);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center">
                      <img x-show="photosUrls[d.id] && photosUrls[d.id].live"
                           :src="photosUrls[d.id] ? photosUrls[d.id].live : ''"
                           @click="agrandir(photosUrls[d.id] && photosUrls[d.id].live)"
                           style="width:100%;height:100%;object-fit:cover;cursor:pointer;transition:transform 0.2s"
                           @mouseenter="this.style.transform='scale(1.05)'"
                           @mouseleave="this.style.transform='scale(1)'">
                      <span x-show="!(photosUrls[d.id] && photosUrls[d.id].live)" style="font-size:32px;color:#ccc">🤳</span>
                    </div>
                    <p style="font-size:11px;font-weight:600;color:var(--blue);margin-top:8px">Selfie (utilisé)</p>
                  </div>
                </div>
              </div>
              <!-- FIN PHOTOS -->

              <!-- Actions Accepter / Rejeter -->
              <div class="grid grid-cols-2 gap-2">
                <button @click="accepter(d.id)" :disabled="actionEnCours"
                        class="bg-green-500 hover:bg-green-600 disabled:bg-gray-300 text-white font-semibold py-2 rounded">
                  ✅ Accepter
                </button>
                <button @click="ouvrirRejet(d)" :disabled="actionEnCours"
                        class="bg-red-500 hover:bg-red-600 disabled:bg-gray-300 text-white font-semibold py-2 rounded">
                  ❌ Rejeter
                </button>
              </div>
            </div>
          </template>
          <div x-show="enCours.length === 0" class="text-center py-8 text-gray-400 text-sm">
            💤 Aucun dossier en cours
          </div>
        </div>
      </div>
    </div>

    <!-- Modal rejet -->
    <div x-show="modalRejet.ouvert" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
      <div class="bg-white rounded-2xl p-6 max-w-md w-full">
        <h3 class="text-xl font-bold mb-4">❌ Rejeter le dossier</h3>
        <p class="text-sm text-gray-600 mb-2">Numéro : <strong x-text="modalRejet.numero"></strong></p>

        <!-- Score face visible dans le modal rejet si disponible -->
        <template x-if="modalRejet.scoreVisage !== null && modalRejet.scoreVisage !== undefined">
          <div class="mb-3 p-2 rounded bg-gray-50 border text-xs text-gray-600">
            🔍 Score reconnaissance faciale : <strong x-text="modalRejet.scoreVisage + ' %'"></strong>
            <span x-show="modalRejet.scoreVisage < 70" class="text-red-600 font-semibold"> — Score faible</span>
            <span x-show="modalRejet.scoreVisage >= 70" class="text-green-600 font-semibold"> — OK</span>
          </div>
        </template>

        <label class="block text-sm font-semibold mt-4 mb-2">Motif de rejet *</label>
        <textarea x-model="modalRejet.raison" rows="3"
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg"
                  placeholder="Expliquez la raison du rejet..."></textarea>
        <div class="flex gap-2 mt-6">
          <button @click="fermerRejet()" class="flex-1 py-2 border border-gray-300 rounded-lg">Annuler</button>
          <button @click="confirmerRejet()"
                  :disabled="!modalRejet.raison || modalRejet.raison.length < 3"
                  class="flex-1 py-2 bg-red-500 hover:bg-red-600 disabled:bg-gray-300 text-white font-semibold rounded-lg">
            Confirmer le rejet
          </button>
        </div>
      </div>
    </div>

    <!-- Lightbox -->
    <div x-show="lightbox" @click="lightbox=''"
         class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4 cursor-zoom-out">
      <img :src="lightbox" class="max-h-full max-w-full rounded-lg shadow-2xl">
    </div>

    <!-- Toast -->
    <div x-show="toast.message"
         class="fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-semibold z-50"
         :class="toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'">
      <span x-text="toast.message"></span>
    </div>
  </main>
</div>

<script>
function fileAttente() {
  return {
    user: {},
    stats: { total: 0, en_attente: 0, en_cours: 0, accepte: 0, rejete: 0 },
    enAttente: [],
    enCours: [],
    photosUrls: {},
    lightbox: '',
    loading: false,
    actionEnCours: false,
    actionFaceVerify: {},   // { [dossierId]: true|false } — verrou par dossier
    derniereMaj: '',
    dossiersAttenteVieux: 0,
    modalRejet: { ouvert: false, id: null, numero: '', raison: '', scoreVisage: null },
    toast: { message: '', type: 'success', timer: null },
    pollingTimer: null,
    heartbeatTimer: null,

    async init() {
      await chargerSidebar('file-attente');
      try { this.user = JSON.parse(sessionStorage.getItem('kyc_user') || '{}'); } catch (e) {}
      await this.charger();
      this.pollingTimer = setInterval(() => this.charger(true), 10000);
      // Heartbeat pour maintenir la présence (éviter que les dossiers reviennent en attente)
      this.heartbeatTimer = setInterval(() => this.envoyerHeartbeat(), 30000);
    },

    // Cleanup des timers quand la page est déchargée
    $destroy() {
      if (this.pollingTimer) clearInterval(this.pollingTimer);
      if (this.heartbeatTimer) clearInterval(this.heartbeatTimer);
    },

    async charger(silencieux) {
      if (!silencieux) this.loading = true;
      const t = sessionStorage.getItem('kyc_token');
      const d = new Date().toISOString().slice(0, 10);
      try {
        const r1 = await fetch('/api/dossiers/stats?date=' + d, { headers: { 'Authorization': 'Bearer ' + t } });
        if (r1.status === 401) { window.location.href = '/login'; return; }
        this.stats = await r1.json();

        const r2 = await fetch('/api/dossiers?date=' + d, { headers: { 'Authorization': 'Bearer ' + t } });
        const dat = await r2.json();
        const tous = dat.dossiers || [];

        this.enAttente = tous
          .filter(d => d.statut === 'en_attente')
          .sort((a, b) => a.created_at - b.created_at);

        this.enCours = tous
          .filter(d => d.statut === 'en_cours' && d.agent_saisie === this.user.matricule);

        this.dossiersAttenteVieux = this.enAttente.filter(d => this.dureeMinutes(d.created_at) > 5).length;
        this.derniereMaj = new Date().toLocaleTimeString('fr-FR');

        await this.chargerPhotosEnCours();
      } catch (e) {
        console.error(e);
      } finally {
        this.loading = false;
      }
    },

    async chargerPhotosEnCours() {
      const t = sessionStorage.getItem('kyc_token');
      const nouveaux = {};
      for (const d of this.enCours) {
        if (this.photosUrls[d.id]) { nouveaux[d.id] = this.photosUrls[d.id]; continue; }
        const p = { recto: null, verso: null, live: null };
        for (const type of ['recto', 'verso', 'live']) {
          try {
            const r = await fetch('/api/dossiers/' + d.id + '/photo/' + type, { headers: { 'Authorization': 'Bearer ' + t } });
            if (r.ok) { const b = await r.blob(); p[type] = URL.createObjectURL(b); }
          } catch (e) {}
        }
        nouveaux[d.id] = p;
      }
      // Liberer les blobs des dossiers qui ne sont plus en cours
      for (const id in this.photosUrls) {
        if (!nouveaux[id]) {
          const p = this.photosUrls[id];
          ['recto', 'verso', 'live'].forEach(k => { if (p && p[k]) URL.revokeObjectURL(p[k]); });
        }
      }
      this.photosUrls = nouveaux;
    },

    // -------------------------------------------------------------------------
    // badgeFaceClass(dossier)
    // Retourne les classes CSS et les labels pour le badge reconnaissance faciale.
    // Gere tous les cas : score OK, score faible, aucun visage, erreur AWS, en attente.
    // -------------------------------------------------------------------------
    badgeFaceClass(d) {
      const score  = d.score_visage;
      const motif  = d.visage_motif;
      const match  = d.visage_match;
      const verifie = d.visage_verifie_le;

      // Pas encore analyse
      if (score === null || score === undefined) {
        if (motif === 'erreur_aws') {
          return {
            bg: 'bg-red-50 border-red-200',
            badge: 'badge-face-error',
            icon: '⚠️', label: 'Erreur AWS',
            color: '#ef4444',
            textClass: 'text-red-600',
            motifLabel: 'La reconnaissance faciale a rencontré une erreur. Relancez l\'analyse ou vérifiez les clés AWS.'
          };
        }
        return {
          bg: 'bg-gray-50 border-gray-200',
          badge: 'badge-face-pending',
          icon: '⏳', label: 'En attente',
          color: '#9ca3af',
          textClass: 'text-gray-500',
          motifLabel: 'Analyse en cours...'
        };
      }

      // Analyse faite — score disponible
      if (match === 1 || match === true) {
        return {
          bg: 'bg-green-50 border-green-200',
          badge: 'badge-face-ok',
          icon: '✅', label: 'Visage OK — ' + score.toFixed(1) + '%',
          color: '#16a34a',
          textClass: 'text-green-700',
          motifLabel: 'Le selfie correspond à la carte d\'identité (score ' + score.toFixed(1) + '% ≥ 70%).'
        };
      }

      // Motif specifique : aucun visage dans le selfie
      if (motif === 'aucun_visage_selfie') {
        return {
          bg: 'bg-yellow-50 border-yellow-200',
          badge: 'badge-face-warn',
          icon: '⚠️', label: 'Pas de visage selfie',
          color: '#d97706',
          textClass: 'text-yellow-700',
          motifLabel: 'Aucun visage détecté dans le selfie. Demandez une nouvelle photo face caméra.'
        };
      }

      // Motif specifique : aucun visage dans la CNI
      if (motif === 'aucun_visage_cni') {
        return {
          bg: 'bg-yellow-50 border-yellow-200',
          badge: 'badge-face-warn',
          icon: '⚠️', label: 'Pas de visage CNI',
          color: '#d97706',
          textClass: 'text-yellow-700',
          motifLabel: 'Aucun visage lisible sur le recto CNI. Demandez une photo de meilleure qualité.'
        };
      }

      // Score faible (visages detectes mais similarite insuffisante)
      return {
        bg: 'bg-red-50 border-red-200',
        badge: 'badge-face-error',
        icon: '❌', label: 'Écart — ' + score.toFixed(1) + '%',
        color: '#dc2626',
        textClass: 'text-red-700',
        motifLabel: 'Le selfie ne correspond pas à la CNI (score ' + score.toFixed(1) + '% < 70%). Vérifiez manuellement.'
      };
    },

    // -------------------------------------------------------------------------
    // relancerFaceVerify(id)
    // Appelle POST /api/dossiers/:id/verifier-visage et rafraichit le dossier.
    // Reserve aux superviseurs/admin (le bouton n'est visible que pour eux).
    // -------------------------------------------------------------------------
    async relancerFaceVerify(id) {
      if (this.actionFaceVerify[id]) return;
      this.actionFaceVerify = { ...this.actionFaceVerify, [id]: true };
      const t = sessionStorage.getItem('kyc_token');
      try {
        const r = await fetch('/api/dossiers/' + id + '/verifier-visage', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + t }
        });
        const dat = await r.json();
        if (r.ok) {
          this.afficherToast('🔍 Score mis à jour : ' + dat.score.toFixed(1) + '%', 'success');
          await this.charger(true);
        } else {
          this.afficherToast(dat.error || 'Erreur AWS', 'error');
        }
      } catch (e) {
        this.afficherToast('Erreur réseau', 'error');
      } finally {
        this.actionFaceVerify = { ...this.actionFaceVerify, [id]: false };
      }
    },

    agrandir(url) { if (url) this.lightbox = url; },

    dureeMinutes(ts) { return Math.floor((Math.floor(Date.now() / 1000) - ts) / 60); },

    async envoyerHeartbeat() {
      const t = sessionStorage.getItem('kyc_token');
      if (!t) return;
      try {
        await fetch('/api/dossiers/ping-dispo', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + t }
        });
      } catch (e) {
        // Silencieux - le prochain heartbeat réessaiera
      }
    },

    async prendre(id) {
      if (this.actionEnCours) return;
      this.actionEnCours = true;
      const t = sessionStorage.getItem('kyc_token');
      try {
        const r = await fetch('/api/dossiers/' + id + '/prendre', { method: 'POST', headers: { 'Authorization': 'Bearer ' + t } });
        const dat = await r.json();
        if (r.ok) { this.afficherToast('Dossier pris', 'success'); await this.charger(); }
        else { this.afficherToast(dat.error || 'Erreur', 'error'); }
      } catch (e) {
        this.afficherToast('Erreur réseau', 'error');
      } finally {
        this.actionEnCours = false;
      }
    },

    async accepter(id) {
      if (!confirm("Confirmer l'acceptation ?")) return;
      if (this.actionEnCours) return;
      this.actionEnCours = true;
      const t = sessionStorage.getItem('kyc_token');
      try {
        const r = await fetch('/api/dossiers/' + id + '/accepter', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' },
          body: '{}'
        });
        const dat = await r.json();
        if (r.ok) { this.afficherToast('✅ Accepté — GSM à remplir', 'success'); setTimeout(() => { window.location.href = '/agent/gsm/' + id; }, 800); return; }
        else { this.afficherToast(dat.error || 'Erreur', 'error'); }
      } catch (e) {
        this.afficherToast('Erreur réseau', 'error');
      } finally {
        this.actionEnCours = false;
      }
    },

    ouvrirRejet(d) {
      this.modalRejet = {
        ouvert: true,
        id: d.id,
        numero: d.numero_mtn,
        raison: '',
        scoreVisage: (d.score_visage !== null && d.score_visage !== undefined) ? d.score_visage.toFixed(1) : null
      };
    },

    fermerRejet() { this.modalRejet.ouvert = false; },

    async confirmerRejet() {
      if (!this.modalRejet.raison || this.modalRejet.raison.length < 3) return;
      this.actionEnCours = true;
      const t = sessionStorage.getItem('kyc_token');
      const id = this.modalRejet.id;
      try {
        const r = await fetch('/api/dossiers/' + id + '/rejeter', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' },
          body: JSON.stringify({ raison_rejet: this.modalRejet.raison })
        });
        const dat = await r.json();
        if (r.ok) { this.afficherToast('❌ Rejeté — GSM à remplir', 'success'); this.fermerRejet(); setTimeout(() => { window.location.href = '/agent/gsm/' + id; }, 800); return; }
        else { this.afficherToast(dat.error || 'Erreur', 'error'); }
      } catch (e) {
        this.afficherToast('Erreur', 'error');
      } finally {
        this.actionEnCours = false;
      }
    },

    afficherToast(m, t) {
      this.toast.message = m; this.toast.type = t || 'success';
      if (this.toast.timer) clearTimeout(this.toast.timer);
      this.toast.timer = setTimeout(() => { this.toast.message = ''; }, 3500);
    }
  };
}
</script>
</body>
</html>
