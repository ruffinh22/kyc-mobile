<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Journal d'audit</title><script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Inter,system-ui,sans-serif}
.sidebar{background:linear-gradient(180deg,#7f1d1d 0%,#991b1b 100%)}
.sb-link{display:flex;align-items:center;padding:.625rem .75rem;border-radius:.5rem;color:#cbd5e1;transition:background .15s,color .15s;text-decoration:none}
.sb-link:hover{background:#1e293b;color:#fff}
.sb-link.active{background:#3b82f6;color:#fff;font-weight:600}
</style>
<script>
async function chargerSidebarAdm(m){
  const t=sessionStorage.getItem('kyc_token');
  if(!t){window.location.href='/login';return}
  const u=JSON.parse(sessionStorage.getItem('kyc_user')||'{}');
  const r=await fetch('/static/pages/_sidebar-admin.html');
  document.getElementById('sidebar-mount').innerHTML=await r.text();
  try{
    document.getElementById('sb-avatar').textContent=(u.matricule||'??').substring(0,2);
    document.getElementById('sb-nom').textContent=u.prenom||u.matricule||'';
    document.getElementById('sb-matricule').textContent=u.matricule||'';
    document.getElementById('sb-role').textContent=u.role||'';
  }catch(e){}
  if(m){const e=document.querySelector('[data-menu="'+m+'"]');if(e)e.classList.add('active')}
}
async function seDeconnecterGlobal(){
  const t=sessionStorage.getItem('kyc_token');
  if(t){try{await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+t}})}catch(e){}}
  sessionStorage.clear();window.location.href='/login';
}
</script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head><body data-antiflash="1" style="background:linear-gradient(180deg,#7f1d1d 0%,#991b1b 100%)" class="bg-gray-100 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount" class="w-64 flex-shrink-0" style="background:linear-gradient(180deg,#7f1d1d 0%,#991b1b 100%);min-height:100vh"></div>
<main class="flex-1 min-w-0 p-6" x-data="auditAdmin()" x-init="init()" style="background:#f3f4f6">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
<div><h1 style="font-size:24px;font-weight:800;color:#1f2937;margin:0">Journal d audit</h1>
<p style="color:#9ca3af;font-size:14px;margin:2px 0 0"><span x-text="logsFiltres().length"></span> entree(s)</p></div>
<button @click="charger()" style="padding:9px 16px;border:1px solid #d1d5db;border-radius:10px;background:#fff;font-size:13px;font-weight:600;color:#374151;cursor:pointer">Actualiser</button>
</div>

<div style="background:#fff;border:1px solid #e8e8ec;border-radius:14px;padding:14px;margin-bottom:16px">
<input type="text" x-model="recherche" placeholder="Rechercher (utilisateur, action, details, IP...)" style="width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;box-sizing:border-box">
</div>

<div style="background:#fff;border:1px solid #e8e8ec;border-radius:16px;padding:8px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow-x:auto">
<table style="width:100%;border-collapse:collapse;font-size:13px">
<thead><tr style="background:#7f1d1d;color:#fff">
<th style="padding:10px 8px;text-align:left;border-radius:8px 0 0 0;white-space:nowrap">DATE</th>
<th style="padding:10px 8px;text-align:left">UTILISATEUR</th>
<th style="padding:10px 8px;text-align:left">ACTION</th>
<th style="padding:10px 8px;text-align:left">DETAILS</th>
<th style="padding:10px 8px;text-align:left;border-radius:0 8px 0 0">IP</th>
</tr></thead>
<tbody>
<template x-for="l in logsFiltres()" :key="l.id">
<tr style="border-bottom:1px solid #f0f0f0">
<td style="padding:8px;color:#6b7280;white-space:nowrap" x-text="l.quand"></td>
<td style="padding:8px;font-weight:600;color:#1f2937" x-text="l.user_matricule||'-'"></td>
<td style="padding:8px"><span style="background:#f3f4f6;color:#374151;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600" x-text="l.action||''"></span></td>
<td style="padding:8px;color:#374151" x-text="l.details||''"></td>
<td style="padding:8px;color:#9ca3af;font-family:monospace;font-size:11px" x-text="l.ip||''"></td>
</tr>
</template>
<tr x-show="logsFiltres().length===0"><td colspan="5" style="padding:20px;text-align:center;color:#9ca3af">Aucune entree</td></tr>
</tbody>
</table>
</div>
</main></div>
<script>
function auditAdmin(){
  return {
    logs:[], recherche:'',
    async init(){
      if(typeof chargerSidebarAdm==='function'){ try{ await chargerSidebarAdm('audit'); }catch(e){} }
      await this.charger();
    },
    async charger(){
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/admin/audit?limit=300',{headers:{'Authorization':'Bearer '+t}});
        if(r.status===401){window.location.href='/login';return}
        const d=await r.json(); this.logs=d.logs||[];
      }catch(e){ this.logs=[]; }
    },
    logsFiltres(){
      if(!this.recherche) return this.logs;
      const q=this.recherche.toLowerCase();
      return this.logs.filter(l=>(l.user_matricule||'').toLowerCase().includes(q)||(l.action||'').toLowerCase().includes(q)||(l.details||'').toLowerCase().includes(q)||(l.ip||'').toLowerCase().includes(q));
    }
  };
}
(function(){
  function demarrer(){ if(typeof chargerSidebarAdm==='function'){ try{ chargerSidebarAdm('audit'); }catch(e){} } }
  if(document.readyState==='loading'){ window.addEventListener('DOMContentLoaded',demarrer); }
})();
</script>
</body></html>
