<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Purge des donnees</title><script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head><body class="bg-gray-100 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount" class="w-64 flex-shrink-0"></div>
<main class="flex-1 min-w-0 p-6" x-data="purge()" x-init="init()" style="background:#f3f4f6">
<div style="margin-bottom:20px">
<h1 style="font-size:24px;font-weight:800;color:#1f2937;margin:0">Purge des donnees</h1>
<p style="color:#9ca3af;font-size:14px;margin:2px 0 0">Suppression definitive. Faites un apercu avant toute action. Code secret requis.</p>
</div>

<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:12px 16px;margin-bottom:18px;color:#991b1b;font-size:13px">
<strong>Attention :</strong> ces suppressions sont definitives et irreversibles. Verifiez toujours l'apercu avant de confirmer.
</div>

<template x-for="sec in sections" :key="sec.action">
<div style="background:#fff;border:1px solid #e8e8ec;border-radius:14px;padding:18px;margin-bottom:16px">
  <h2 style="font-size:17px;font-weight:700;color:#1f2937;margin:0 0 4px" x-text="sec.titre"></h2>
  <p style="font-size:13px;color:#9ca3af;margin:0 0 14px" x-text="sec.desc"></p>

  <div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px">
    <div>
      <label style="display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px">Mode</label>
      <select x-model="sec.mode" style="padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px">
        <option value="tout">Tout</option>
        <option value="periode">Par periode</option>
      </select>
    </div>
    <template x-if="sec.mode==='periode'">
      <div style="display:flex;gap:10px;align-items:flex-end">
        <div><label style="display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px">Du</label>
          <input type="date" x-model="sec.du" style="padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px"></div>
        <div><label style="display:block;font-size:12px;font-weight:600;color:#6b7280;margin-bottom:4px">Au</label>
          <input type="date" x-model="sec.au" style="padding:8px 10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px"></div>
      </div>
    </template>
    <button @click="apercu(sec)" :disabled="sec.loading" style="background:#475569;color:#fff;font-weight:600;padding:9px 16px;border:none;border-radius:8px;cursor:pointer">Apercu</button>
  </div>

  <div x-show="sec.compte!==null" style="background:#f1f5f9;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:14px;color:#1f2937">
    <strong x-text="sec.compte"></strong> <span x-text="sec.unite"></span> seront affectes par cette action.
  </div>

  <div x-show="sec.compte!==null && sec.compte>0" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-top:1px solid #f1f5f9;padding-top:12px">
    <input type="password" x-model="sec.code" placeholder="Code secret" style="padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px">
    <button @click="executer(sec)" :disabled="sec.loading || !sec.code" style="background:#b91c1c;color:#fff;font-weight:700;padding:9px 18px;border:none;border-radius:8px;cursor:pointer">Supprimer definitivement</button>
    <span x-show="sec.msg" x-text="sec.msg" :style="sec.ok?'color:#15803d':'color:#b91c1c'" style="font-size:13px;font-weight:600"></span>
  </div>
  <div x-show="sec.compte===0" style="font-size:13px;color:#9ca3af;font-style:italic">Rien a supprimer pour cette selection.</div>
</div>
</template>
</main></div>

<script>
function purge(){
  return {
    sections:[
      {action:'images_cni', titre:'Images CNI', desc:'Supprime les images (recto/verso/live) des dossiers. Les dossiers sont conserves.', unite:'dossier(s) avec images', mode:'tout', du:'', au:'', compte:null, code:'', loading:false, msg:'', ok:false},
      {action:'captures_gsm', titre:'Captures GSM', desc:'Supprime les captures des saisies Gross Add. Les saisies sont conservees.', unite:'saisie(s) avec captures', mode:'tout', du:'', au:'', compte:null, code:'', loading:false, msg:'', ok:false},
      {action:'saisies_gsm', titre:'Saisies GSM entieres', desc:'Supprime des lignes completes de la table GSM.', unite:'saisie(s)', mode:'tout', du:'', au:'', compte:null, code:'', loading:false, msg:'', ok:false},
      {action:'dossiers', titre:'Dossiers entiers', desc:'Supprime des dossiers complets (et leurs images).', unite:'dossier(s)', mode:'tout', du:'', au:'', compte:null, code:'', loading:false, msg:'', ok:false}
    ],
    token(){ return sessionStorage.getItem('kyc_token')||''; },
    async init(){
      try{ const r=await fetch('/static/pages/_sidebar-admin.html'); if(r.ok){ document.getElementById('sidebar-mount').innerHTML=await r.text(); } }catch(e){}
    },
    body(sec){ return {action:sec.action, mode:sec.mode, du:sec.du, au:sec.au}; },
    async apercu(sec){
      sec.loading=true; sec.msg=''; sec.compte=null;
      try{
        const r=await fetch('/api/admin/purge/apercu',{method:'POST',headers:{'Authorization':'Bearer '+this.token(),'Content-Type':'application/json'},body:JSON.stringify(this.body(sec))});
        if(r.ok){ const d=await r.json(); sec.compte=d.apercu[sec.action]; }
        else { const e=await r.json().catch(()=>({})); sec.msg=e.error||'Erreur apercu'; }
      }catch(e){ sec.msg='Erreur reseau'; }
      sec.loading=false;
    },
    async executer(sec){
      const ok = window.confirm('Confirmer la suppression definitive de '+sec.compte+' '+sec.unite+' ? Cette action est irreversible.');
      if(!ok) return;
      sec.loading=true; sec.msg='';
      try{
        const payload=this.body(sec); payload.code=sec.code;
        const r=await fetch('/api/admin/purge/executer',{method:'POST',headers:{'Authorization':'Bearer '+this.token(),'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const d=await r.json().catch(()=>({}));
        if(r.ok){ sec.ok=true; sec.msg=d.supprimes+' element(s) supprime(s)'; sec.compte=null; sec.code=''; }
        else { sec.ok=false; sec.msg=d.error||'Erreur'; }
      }catch(e){ sec.ok=false; sec.msg='Erreur reseau'; }
      sec.loading=false;
    }
  };
}
</script>
</body></html>
