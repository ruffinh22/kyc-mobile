<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEDIA CONTACT — Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{
      font-family:'Manrope',system-ui,sans-serif;
      background:#0a0a0b;
      background-image:
        radial-gradient(ellipse 80% 55% at 50% -5%, rgba(90,90,98,.35), transparent 60%),
        radial-gradient(ellipse 120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,.6) 100%);
    }
    .logo-row{display:flex;align-items:center;gap:2px;}
    .logo-mark{width:26px;height:26px;background:#e3000f;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:-6px;position:relative;z-index:1;}
    .logo-mark span{font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#fff;line-height:1;transform:translateX(2px);}
    .logo-text{font-family:'Sora',sans-serif;font-weight:800;font-size:19px;letter-spacing:.3px;color:#111;line-height:1;}
    .logo-tag{font-style:italic;font-weight:600;font-size:10px;color:#111;margin-top:3px;letter-spacing:.2px;text-align:center;}
    .lbl{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#9ca3af;margin-bottom:7px;}
    .inp{width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:15px;color:#111;background:#fff;transition:border-color .15s,box-shadow .15s;}
    .inp:focus{outline:none;border-color:#e3000f;box-shadow:0 0 0 3px rgba(227,0,15,.18);}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div x-data="loginForm()" class="w-full max-w-sm">

    <div class="bg-white rounded-2xl p-7" style="box-shadow:0 25px 60px rgba(0,0,0,.55)">

      <!-- Logo MEDIA CONTACT (centre) -->
      <div class="flex flex-col items-center mb-7">
        <div class="logo-row">
          <span class="logo-mark"><span>M</span></span>
          <span class="logo-text">EDIA CONTACT</span>
        </div>
        <div class="logo-tag">The offshore company</div>
      </div>

      <!-- Erreur -->
      <div x-show="erreur" x-transition class="bg-red-50 border-l-4 border-red-500 p-3 mb-4 rounded">
        <p class="text-red-700 text-sm" x-text="erreur"></p>
      </div>

      <!-- Tentatives restantes -->
      <div x-show="tentativesRestantes !== null && tentativesRestantes < 5" x-transition class="bg-orange-50 border-l-4 border-orange-500 p-3 mb-4 rounded">
        <p class="text-orange-700 text-sm">⚠️ Tentatives restantes : <strong x-text="tentativesRestantes"></strong></p>
      </div>

      <!-- Formulaire -->
      <div class="space-y-4">

        <!-- Identifiant -->
        <div>
          <label class="lbl">Prénom / identifiant</label>
          <input
            x-model="matricule"
            @keydown.enter="seConnecter()"
            type="text"
            placeholder="Identifiant"
            autocomplete="username"
            class="inp"
            :disabled="loading">
        </div>

        <!-- Mot de passe -->
        <div>
          <label class="lbl">Mot de passe</label>
          <div class="relative">
            <input
              x-model="password"
              @keydown.enter="seConnecter()"
              :type="showPassword ? 'text' : 'password'"
              placeholder="••••••"
              autocomplete="current-password"
              class="inp pr-12"
              :disabled="loading">
            <button type="button" @click="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <span x-show="!showPassword">👁️</span>
              <span x-show="showPassword">🙈</span>
            </button>
          </div>
        </div>

        <!-- Bouton connexion -->
        <button
          @click="seConnecter()"
          :disabled="loading || !matricule || !password"
          class="w-full text-white font-bold py-3 rounded-lg transition-all flex items-center justify-center mt-1 disabled:opacity-40 disabled:cursor-not-allowed" style="background:linear-gradient(135deg,#e3000f,#b00009);box-shadow:0 6px 18px rgba(227,0,15,.35)">
          <span x-show="!loading">Se connecter →</span>
          <span x-show="loading" class="flex items-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Connexion...
          </span>
        </button>

        <!-- Retour au portail -->
        <a href="/"
          class="block w-full text-center border border-yellow-500 text-yellow-600 hover:bg-yellow-50 font-semibold py-3 rounded-lg transition-colors">
          ← Retour au portail
        </a>

      </div>
    </div>

  </div>

  <script>
    function loginForm() {
      return {
        matricule: '',
        password: '',
        showPassword: false,
        loading: false,
        erreur: '',
        tentativesRestantes: null,

        async seConnecter() {
          this.erreur = '';
          this.tentativesRestantes = null;

          if (!this.matricule || !this.password) {
            this.erreur = 'Identifiant et mot de passe obligatoires';
            return;
          }

          this.loading = true;

          try {
            const r = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                matricule: this.matricule.toUpperCase().trim(),
                password: this.password
              })
            });

            const data = await r.json();

            if (!r.ok) {
              this.erreur = data.error || 'Erreur de connexion';
              if (typeof data.tentatives_restantes === 'number') {
                this.tentativesRestantes = data.tentatives_restantes;
              }
              this.loading = false;
              return;
            }

            // Stocker le token et l'user
            sessionStorage.setItem('kyc_token', data.token);
            sessionStorage.setItem('kyc_user', JSON.stringify(data.user));

            // Si doit changer mot de passe -> redirection
            if (data.must_change_password) {
              window.location.href = '/change-password';
            } else {
              this.redirigerParRole(data.user.role);
            }

          } catch (err) {
            this.erreur = 'Erreur reseau. Verifiez votre connexion.';
            console.error(err);
            this.loading = false;
          }
        },

        redirigerParRole(role) {
          if (role === 'agent') {
            window.location.href = '/agent/dashboard';
          } else if (role === 'superviseur') {
            window.location.href = '/sup/dashboard';
          } else if (role === 'admin') {
            window.location.href = '/admin/dashboard';
          } else {
            window.location.href = '/home';
          }
        }
      };
    }
  </script>

</body>
</html>
