<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>KYC BO - Mes performances</title><script src="https://cdn.tailwindcss.com"></script><script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
body{font-family:'Inter',system-ui,sans-serif}
.sidebar{background:linear-gradient(180deg,#1A1A1A 0%,#2a2a2a 100%)}
.sb-link{display:flex;align-items:center;padding:.625rem .75rem;border-radius:.5rem;color:#d1d5db;transition:background .15s,color .15s;text-decoration:none}
.sb-link:hover{background:#374151;color:#fff}
.sb-link.active{background:#eab308;color:#111827;font-weight:600}
</style>
<script>
async function chargerSidebar(m){
  const t=sessionStorage.getItem('kyc_token');
  if(!t){window.location.href='/login';return}
  const r=await fetch('/static/pages/_sidebar.html');
  document.getElementById('sidebar-mount').innerHTML=await r.text();
  try{
    const u=JSON.parse(sessionStorage.getItem('kyc_user')||'{}');
    document.getElementById('sb-avatar').textContent=(u.matricule||'??').substring(0,2);
    document.getElementById('sb-nom').textContent=u.prenom||u.matricule||'';
    document.getElementById('sb-matricule').textContent=u.matricule||'';
    document.getElementById('sb-role').textContent=u.role||'';
  }catch(e){}
  if(m){const e=document.querySelector('[data-menu="'+m+'"]');if(e)e.classList.add('active')}
}
async function seDeconnecterGlobal(){
  const t=sessionStorage.getItem('kyc_token');
  if(t){try{await fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+t}})}catch(e){}}
  sessionStorage.clear();window.location.href='/login';
}
</script>
</head><body data-antiflash="1" style="background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%)" class="bg-gray-100 min-h-screen"><div class="flex min-h-screen"><div id="sidebar-mount" class="w-64 flex-shrink-0" style="background:linear-gradient(180deg,#1a1a1a 0%,#2d2d2d 100%);min-height:100vh"></div>
<main class="flex-1 min-w-0 p-6" x-data="perf()" x-init="init()">

<div class="mb-5 border-b border-gray-200 pb-3"><h1 class="text-2xl font-bold text-gray-800">📈 Mes performances</h1></div>

<!-- Navigation mois de paie -->
<div class="bg-white rounded-xl border border-gray-200 p-4 mb-4 flex items-center justify-between">
<button @click="navMois(-1)" class="px-3 py-1.5 bg-yellow-500 hover:bg-yellow-600 text-white text-sm font-semibold rounded-lg" x-text="'‹ '+labelMois(-1)"></button>
<div class="text-center"><p class="font-bold text-gray-800">📅 Mois de paie : <span x-text="labelMois(0)"></span></p><p class="text-xs text-gray-500">Du <span x-text="formatDate(debut)"></span> au <span x-text="formatDate(fin)"></span></p></div>
<button @click="navMois(1)" class="px-3 py-1.5 bg-yellow-500 hover:bg-yellow-600 text-white text-sm font-semibold rounded-lg" x-text="labelMois(1)+' ›'"></button>
</div>

<!-- Filtre Du / Au -->
<div class="bg-white rounded-xl border border-gray-200 p-4 mb-5 flex flex-wrap items-end gap-3">
<div><label class="block text-xs font-semibold text-gray-500 mb-1">Du</label><input type="date" x-model="debut" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
<div><label class="block text-xs font-semibold text-gray-500 mb-1">Au</label><input type="date" x-model="fin" class="px-3 py-2 border border-gray-300 rounded-lg text-sm"></div>
<button @click="charger()" class="px-4 py-2 bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-lg">🔍 Afficher</button>
<button @click="moisCourant()" class="px-4 py-2 bg-yellow-500 hover:bg-yellow-600 text-white text-sm font-semibold rounded-lg">↺ Mois en cours</button>
<div class="flex-1"></div>
<p class="text-xs text-gray-400">ⓘ Mois de paie : du 15 au 14 du mois suivant</p>
</div>

<!-- 4 cartes -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-5">
<div class="rounded-xl p-5 text-white shadow" style="background:#1e3a5f"><p class="text-[11px] font-semibold uppercase tracking-wide opacity-80">Total numéros traités</p><p class="text-4xl font-bold mt-2" x-text="stats.total"></p></div>
<div class="rounded-xl p-5 text-white shadow" style="background:#15803d"><p class="text-[11px] font-semibold uppercase tracking-wide opacity-80">Jours d'activité</p><p class="text-4xl font-bold mt-2" x-text="stats.jours_travailles"></p><p class="text-xs opacity-90 mt-1" x-text="'sur '+stats.jours_periode+' jours'"></p></div>
<div class="rounded-xl p-5 text-white shadow" style="background:#0e7490"><p class="text-[11px] font-semibold uppercase tracking-wide opacity-80">Moyenne / jour</p><p class="text-4xl font-bold mt-2" x-text="stats.moyenne"></p></div>
<div class="rounded-xl p-5 text-white shadow" style="background:#d97706"><p class="text-[11px] font-semibold uppercase tracking-wide opacity-80">Meilleur jour</p><p class="text-4xl font-bold mt-2" x-text="stats.meilleur_jour.n"></p><p class="text-xs opacity-90 mt-1" x-text="stats.meilleur_jour.jour?formatDate(stats.meilleur_jour.jour):''"></p></div>
</div>

<!-- Évolution quotidienne -->
<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
<div class="px-4 py-3 border-b border-gray-100"><h3 class="font-bold text-gray-800">📊 Évolution quotidienne</h3></div>
<div class="p-5">
<div x-show="evolution.length===0" class="text-center text-gray-400 py-10 border border-dashed border-gray-200 rounded-lg">Aucune activité sur cette période.</div>
<div x-show="evolution.length>0" class="flex items-end gap-1 overflow-x-auto" style="height:220px">
<template x-for="e in evolution" :key="e.jour">
<div class="flex flex-col items-center justify-end flex-shrink-0" style="min-width:28px;height:100%">
<span class="text-[10px] font-semibold text-gray-600 mb-1" x-text="e.n"></span>
<div class="w-5 bg-blue-600 rounded-t" :style="'height:'+barre(e.n)+'%'" :title="formatDate(e.jour)+' : '+e.n"></div>
<span class="text-[8px] text-gray-400 mt-1 whitespace-nowrap" x-text="jourMois(e.jour)"></span>
</div>
</template>
</div>
</div>
</div>

<div x-show="toast.message" class="fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white font-semibold z-50 bg-red-500"><span x-text="toast.message"></span></div>

</main></div>
<script>
function perf(){
  const pad=n=>String(n).padStart(2,'0');
  const ymd=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  const MOIS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  return {
    user:{},
    debut:'',
    fin:'',
    stats:{total:0,jours_travailles:0,jours_periode:30,moyenne:0,meilleur_jour:{jour:null,n:0}},
    evolution:[],
    toast:{message:'',timer:null},
    async init(){
      await chargerSidebar('performance');
      try{this.user=JSON.parse(sessionStorage.getItem('kyc_user')||'{}')}catch(e){}
      this.moisCourant(false);
      await this.charger();
    },
    periodePaie(ref){
      // ref = Date quelconque -> renvoie {debut,fin} du mois de paie qui contient ref
      const d=new Date(ref);
      let deb,fn;
      if(d.getDate()>=15){deb=new Date(d.getFullYear(),d.getMonth(),15);fn=new Date(d.getFullYear(),d.getMonth()+1,14);}
      else{deb=new Date(d.getFullYear(),d.getMonth()-1,15);fn=new Date(d.getFullYear(),d.getMonth(),14);}
      return {debut:deb,fin:fn};
    },
    moisCourant(recharger){
      const p=this.periodePaie(new Date());
      this.debut=ymd(p.debut);this.fin=ymd(p.fin);
      if(recharger!==false)this.charger();
    },
    navMois(delta){
      // décale le mois de paie de delta, en se basant sur le début courant
      const d=new Date(this.debut+'T00:00:00');
      const deb=new Date(d.getFullYear(),d.getMonth()+delta,15);
      const fn=new Date(d.getFullYear(),d.getMonth()+delta+1,14);
      this.debut=ymd(deb);this.fin=ymd(fn);
      this.charger();
    },
    labelMois(delta){
      // libellé du mois de paie (mois de FIN) décalé de delta
      const d=new Date(this.debut+'T00:00:00');
      const fn=new Date(d.getFullYear(),d.getMonth()+delta+1,14);
      return MOIS[fn.getMonth()]+' '+fn.getFullYear();
    },
    async charger(){
      const t=sessionStorage.getItem('kyc_token');
      try{
        const r=await fetch('/api/gsm/mes-perfs?debut='+this.debut+'&fin='+this.fin,{headers:{'Authorization':'Bearer '+t}});
        if(r.status===401){window.location.href='/login';return}
        if(r.ok){const d=await r.json();this.stats={total:d.total,jours_travailles:d.jours_travailles,jours_periode:d.jours_periode,moyenne:d.moyenne,meilleur_jour:d.meilleur_jour||{jour:null,n:0}};this.evolution=d.evolution||[]}
      }catch(e){console.error(e)}
    },
    barre(n){const max=this.stats.meilleur_jour.n||1;return Math.max(4,Math.round(n/max*100))},
    jourMois(s){if(!s)return'';const p=s.split('-');return p.length===3?(p[2]+'/'+p[1]):s},
    formatDate(s){if(!s)return'';const p=s.split('-');return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):s}
  };
}
</script>
</body></html>
